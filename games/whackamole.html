<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Whack-a-Mole - MortApps Studios</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔨</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --surface: #0f172a;
            --surface-light: #1e293b;
            --surface-lighter: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #f59e0b;
            --accent-light: #fbbf24;
            --accent-glow: rgba(245, 158, 11, 0.4);
            --accent-dim: rgba(245, 158, 11, 0.15);
            --border: rgba(51, 65, 85, 0.5);
            --font-display: 'Sora', sans-serif;
            --font-body: 'DM Sans', sans-serif;
            --hole-size: 95px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(245, 158, 11, 0.1), transparent),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(251, 191, 36, 0.06), transparent),
                var(--bg);
        }
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(2, 6, 23, 0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0.6rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 0.5rem 0.75rem;
            border-radius: 10px;
            transition: all 0.2s;
        }
        .back-btn:hover { color: var(--text); background: var(--surface-light); }
        .brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--text);
        }
        .brand-icon {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }
        .brand-icon svg { width: 18px; height: 18px; }
        .brand-text { font-family: var(--font-display); font-weight: 700; font-size: 1rem; }
        .stats { display: flex; gap: 0.6rem; }
        .stat {
            text-align: center;
            background: var(--surface);
            padding: 0.35rem 0.75rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            min-width: 56px;
        }
        .stat-label { font-size: 0.55rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.05em; }
        .stat-value { font-family: var(--font-display); font-weight: 700; font-size: 1.15rem; color: var(--accent-light); }
        .game-wrapper {
            padding-top: 60px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 1rem;
        }
        .game-container {
            background: linear-gradient(145deg, var(--surface), rgba(15, 23, 42, 0.8));
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 1.25rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 80px -30px var(--accent-glow);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, var(--hole-size));
            gap: clamp(0.5rem, 2vw, 1rem);
            justify-content: center;
        }
        .hole {
            width: var(--hole-size);
            height: var(--hole-size);
            background: radial-gradient(ellipse at center, #1a0a00 0%, #0a0500 80%, #050200 100%);
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            box-shadow: 
                inset 0 8px 25px rgba(0, 0, 0, 0.9),
                inset 0 -2px 8px rgba(245, 158, 11, 0.08),
                0 0 20px rgba(245, 158, 11, 0.1),
                0 0 40px rgba(245, 158, 11, 0.05);
            border: 2px solid rgba(245, 158, 11, 0.15);
            transition: border-color 0.2s, box-shadow 0.2s;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .hole:active { border-color: rgba(245, 158, 11, 0.5); }
        .hole.hit-flash {
            animation: holeFlash 0.3s ease-out;
        }
        @keyframes holeFlash {
            0% { box-shadow: inset 0 8px 25px rgba(0,0,0,0.9), 0 0 30px rgba(245,158,11,0.6); border-color: rgba(245,158,11,0.7); }
            100% { box-shadow: inset 0 8px 25px rgba(0,0,0,0.9), 0 0 20px rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.15); }
        }

        /* SVG Mole styling */
        .mole {
            position: absolute;
            width: 70%;
            height: 70%;
            left: 15%;
            bottom: 12%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateY(110%);
            will-change: transform;
            pointer-events: none;
        }
        .mole.up { transform: translateY(0%); }
        .mole.hit { animation: moleHit 0.35s ease-out forwards; }
        @keyframes moleHit {
            0% { transform: translateY(0%) scale(1); }
            25% { transform: translateY(-12%) scale(1.15); }
            100% { transform: translateY(110%) scale(0.7); }
        }
        .mole.up { 
            transition: transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }
        .mole:not(.up):not(.hit) {
            transition: transform 0.2s ease-in;
        }

        /* Hit score popup */
        .score-popup {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--accent-light);
            text-shadow: 0 0 10px var(--accent-glow);
            pointer-events: none;
            z-index: 20;
            animation: scoreUp 0.6s ease-out forwards;
        }
        @keyframes scoreUp {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-40px); }
        }

        /* Overlays */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            transition: opacity 0.35s, visibility 0.35s;
            opacity: 1;
            visibility: visible;
        }
        .overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .overlay-content { text-align: center; padding: 2rem; max-width: 320px; }
        .overlay-icon { 
            width: 80px; height: 80px; 
            margin: 0 auto 1rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .overlay-icon svg { width: 100%; height: 100%; }
        .overlay-icon.bounce { animation: bounce 0.6s ease infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .overlay-title {
            font-family: var(--font-display);
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .overlay-subtitle { color: var(--text-muted); margin-bottom: 1.25rem; font-size: 0.9rem; line-height: 1.5; }
        .score-large {
            font-family: var(--font-display);
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-light), #d97706);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0.5rem 0;
        }
        .score-label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem; }
        .btn {
            font-family: var(--font-body);
            font-weight: 600;
            border: none;
            cursor: pointer;
            padding: 0.8rem 1.75rem;
            border-radius: 14px;
            font-size: 0.95rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            -webkit-tap-highlight-color: transparent;
        }
        .btn svg { width: 18px; height: 18px; }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #d97706);
            color: #000;
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn-primary:active { transform: translateY(0) scale(0.97); }
        .game-footer { text-align: center; padding: 1rem; color: var(--text-muted); font-size: 0.7rem; }

        /* Responsive */
        @media (max-width: 400px) {
            :root { --hole-size: 75px; }
            .brand-text { display: none; }
            .overlay-title { font-size: 1.5rem; }
            .score-large { font-size: 2.75rem; }
            .overlay-icon { width: 64px; height: 64px; }
            .game-container { padding: 0.75rem; border-radius: 18px; }
            .grid { gap: 0.4rem; }
        }
        @media (max-width: 340px) {
            :root { --hole-size: 65px; }
            .grid { gap: 0.35rem; }
            .game-container { padding: 0.6rem; }
            .stat { padding: 0.25rem 0.5rem; min-width: 48px; }
            .stat-value { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <header class="header">
        <a href="../games.html" class="back-btn">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            Back
        </a>
        <a href="../index.html" class="brand">
            <div class="brand-icon">
                <!-- Hammer SVG Icon -->
                <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 12l-8.5 8.5c-.83.83-2.17.83-3 0 0 0 0 0 0 0a2.12 2.12 0 010-3L12 9"/>
                    <path d="M17.64 15L22 10.64l-3.5-3.5L14 11.5"/>
                    <path d="M20 6l-1.5 1.5"/>
                    <path d="M16 2l3.5 3.5"/>
                </svg>
            </div>
            <span class="brand-text">MortApps</span>
        </a>
        <div class="stats">
            <div class="stat"><div class="stat-label">Score</div><div class="stat-value" id="score">0</div></div>
            <div class="stat"><div class="stat-label">Time</div><div class="stat-value" id="time">30</div></div>
        </div>
    </header>
    <div class="game-wrapper">
        <div class="game-container">
            <div class="grid" id="grid"></div>
        </div>
    </div>
    
    <!-- Start Overlay -->
    <div class="overlay" id="startOverlay">
        <div class="overlay-content">
            <div class="overlay-icon bounce">
                <!-- Hammer SVG Icon -->
                <svg viewBox="0 0 80 80" fill="none">
                    <defs>
                        <linearGradient id="hammerHead" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#fbbf24"/>
                            <stop offset="100%" stop-color="#d97706"/>
                        </linearGradient>
                    </defs>
                    <rect x="28" y="8" width="32" height="20" rx="4" fill="url(#hammerHead)" stroke="#92400e" stroke-width="1.5"/>
                    <rect x="37" y="26" width="8" height="42" rx="3" fill="#78350f" stroke="#451a03" stroke-width="1"/>
                    <rect x="28" y="10" width="32" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
                    <circle cx="44" cy="18" r="3" fill="rgba(255,255,255,0.15)"/>
                </svg>
            </div>
            <h1 class="overlay-title">Whack-a-Mole</h1>
            <p class="overlay-subtitle">Tap the moles before they hide! You have 30 seconds!</p>
            <button class="btn btn-primary" id="startBtn">
                <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
                Start Game
            </button>
        </div>
    </div>
    
    <!-- Game Over Overlay -->
    <div class="overlay hidden" id="over">
        <div class="overlay-content">
            <div class="overlay-icon">
                <!-- Celebration SVG Icon -->
                <svg viewBox="0 0 80 80" fill="none">
                    <path d="M40 10 L44 30 L40 24 L36 30Z" fill="#fbbf24"/>
                    <path d="M40 70 L44 50 L40 56 L36 50Z" fill="#f97316"/>
                    <path d="M10 40 L30 36 L24 40 L30 44Z" fill="#fbbf24"/>
                    <path d="M70 40 L50 36 L56 40 L50 44Z" fill="#f97316"/>
                    <path d="M18 18 L32 32 L26 30Z" fill="#fbbf24"/>
                    <path d="M62 18 L48 32 L54 30Z" fill="#f97316"/>
                    <path d="M18 62 L32 48 L30 54Z" fill="#ef4444"/>
                    <path d="M62 62 L48 48 L50 54Z" fill="#fbbf24"/>
                    <circle cx="40" cy="40" r="12" fill="#fbbf24" opacity="0.9"/>
                    <circle cx="40" cy="40" r="6" fill="#fef3c7" opacity="0.8"/>
                    <circle cx="20" cy="15" r="3" fill="#fbbf24" opacity="0.6"/>
                    <circle cx="60" cy="15" r="2.5" fill="#f97316" opacity="0.6"/>
                    <circle cx="15" cy="55" r="2" fill="#ef4444" opacity="0.6"/>
                    <circle cx="65" cy="55" r="3" fill="#fbbf24" opacity="0.6"/>
                </svg>
            </div>
            <h1 class="overlay-title">Time's Up!</h1>
            <div class="score-large" id="final">0</div>
            <div class="score-label">Moles Whacked</div>
            <button class="btn btn-primary" id="again">
                <!-- Refresh SVG Icon -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"/>
                    <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
                </svg>
                Play Again
            </button>
        </div>
    </div>
    
    <footer class="game-footer">&copy; 2026 MortApps Studios</footer>
    
    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        
        const grid = document.getElementById('grid');
        const scoreEl = document.getElementById('score');
        const timeEl = document.getElementById('time');
        const finalEl = document.getElementById('final');
        let score = 0, time = 30, playing = false, moles = [], timerInterval, moleInterval;
        
        // SVG Mole face generator - creates distinct mole characters
        const moleTypes = [
            { bodyColor: '#8B5E3C', cheekColor: '#D4956A', noseColor: '#2D1B0E', name: 'brown' },
            { bodyColor: '#6B4226', cheekColor: '#B8845A', noseColor: '#1A0F05', name: 'dark' },
            { bodyColor: '#A0724E', cheekColor: '#D4A574', noseColor: '#3D2B1F', name: 'light' },
            { bodyColor: '#7A5230', cheekColor: '#C49060', noseColor: '#2A1A0A', name: 'russet' }
        ];

        function createMoleSVG(type) {
            const m = moleTypes[type];
            const size = '100%';
            return `<svg viewBox="0 0 60 55" width="${size}" height="${size}" style="display:block;">
                <!-- Body -->
                <ellipse cx="30" cy="32" rx="24" ry="20" fill="${m.bodyColor}"/>
                <!-- Belly -->
                <ellipse cx="30" cy="38" rx="16" ry="12" fill="${m.cheekColor}" opacity="0.5"/>
                <!-- Left ear -->
                <circle cx="12" cy="16" r="7" fill="${m.bodyColor}"/>
                <circle cx="12" cy="16" r="4" fill="#D4956A" opacity="0.5"/>
                <!-- Right ear -->
                <circle cx="48" cy="16" r="7" fill="${m.bodyColor}"/>
                <circle cx="48" cy="16" r="4" fill="#D4956A" opacity="0.5"/>
                <!-- Left eye white -->
                <ellipse cx="21" cy="27" rx="6" ry="7" fill="white"/>
                <!-- Left pupil -->
                <circle cx="22" cy="28" r="3.5" fill="#1a1a2e"/>
                <!-- Left eye shine -->
                <circle cx="23.5" cy="26.5" r="1.2" fill="white"/>
                <!-- Right eye white -->
                <ellipse cx="39" cy="27" rx="6" ry="7" fill="white"/>
                <!-- Right pupil -->
                <circle cx="40" cy="28" r="3.5" fill="#1a1a2e"/>
                <!-- Right eye shine -->
                <circle cx="41.5" cy="26.5" r="1.2" fill="white"/>
                <!-- Nose -->
                <ellipse cx="30" cy="35" rx="5" ry="3.5" fill="${m.noseColor}"/>
                <!-- Nose shine -->
                <ellipse cx="29" cy="34" rx="1.5" ry="1" fill="rgba(255,255,255,0.3)"/>
                <!-- Whiskers -->
                <line x1="6" y1="33" x2="19" y2="35" stroke="#5a3a1a" stroke-width="0.8" opacity="0.5"/>
                <line x1="6" y1="37" x2="19" y2="37" stroke="#5a3a1a" stroke-width="0.8" opacity="0.5"/>
                <line x1="41" y1="35" x2="54" y2="33" stroke="#5a3a1a" stroke-width="0.8" opacity="0.5"/>
                <line x1="41" y1="37" x2="54" y2="37" stroke="#5a3a1a" stroke-width="0.8" opacity="0.5"/>
                <!-- Left cheek -->
                <circle cx="15" cy="38" r="4" fill="#ff9999" opacity="0.35"/>
                <!-- Right cheek -->
                <circle cx="45" cy="38" r="4" fill="#ff9999" opacity="0.35"/>
                <!-- Mouth -->
                <path d="M26 40 Q30 44 34 40" fill="none" stroke="${m.noseColor}" stroke-width="1.2" stroke-linecap="round"/>
            </svg>`;
        }

        function init() {
            grid.innerHTML = '';
            moles = [];
            score = 0;
            time = 30;
            scoreEl.textContent = 0;
            timeEl.textContent = 30;
            
            for (let i = 0; i < 9; i++) {
                const hole = document.createElement('div');
                hole.className = 'hole';
                hole.setAttribute('role', 'button');
                hole.setAttribute('aria-label', 'Mole hole ' + (i + 1));
                
                const mole = document.createElement('div');
                mole.className = 'mole';
                mole.innerHTML = createMoleSVG(i % moleTypes.length);
                hole.appendChild(mole);
                grid.appendChild(hole);
                moles.push(mole);
                
                // Use touchstart for instant mobile response + click fallback
                hole.addEventListener('touchstart', function(e) {
                    e.preventDefault();
                    whack(mole, hole);
                }, { passive: false });
                hole.addEventListener('click', function() {
                    whack(mole, hole);
                });
            }
        }
        
        function show() {
            if (!playing) return;
            const available = moles.filter(m => !m.classList.contains('up') && !m.classList.contains('hit'));
            if (available.length) {
                const m = available[Math.floor(Math.random() * available.length)];
                m.innerHTML = createMoleSVG(Math.floor(Math.random() * moleTypes.length));
                m.classList.add('up');
                const hideDelay = Math.max(300, 800 - score * 2);
                const timer = setTimeout(() => {
                    if (m.classList.contains('up') && !m.classList.contains('hit')) {
                        m.classList.remove('up');
                    }
                }, hideDelay + Math.random() * 400);
                m._hideTimer = timer;
            }
        }
        
        function whack(m, hole) {
            if (!playing || !m.classList.contains('up') || m.classList.contains('hit')) return;
            
            clearTimeout(m._hideTimer);
            m.classList.add('hit');
            score += 10;
            scoreEl.textContent = score;
            
            // Hole flash effect
            hole.classList.remove('hit-flash');
            void hole.offsetWidth; // force reflow
            hole.classList.add('hit-flash');
            
            // Score popup
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.textContent = '+10';
            hole.appendChild(popup);
            setTimeout(() => popup.remove(), 600);
            
            setTimeout(() => {
                m.classList.remove('up', 'hit');
            }, 350);
        }
        
        function start() {
            init();
            playing = true;
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('over').classList.add('hidden');
            
            timerInterval = setInterval(() => {
                time--;
                timeEl.textContent = time;
                if (time <= 5) {
                    timeEl.style.color = '#ef4444';
                }
                if (time <= 0) end();
            }, 1000);
            
            // Progressive difficulty - moles appear faster as score increases
            function scheduleMole() {
                if (!playing) return;
                show();
                const interval = Math.max(300, 600 - score);
                moleInterval = setTimeout(scheduleMole, interval + Math.random() * 300);
            }
            scheduleMole();
        }
        
        function end() {
            playing = false;
            clearInterval(timerInterval);
            clearTimeout(moleInterval);
            timeEl.style.color = '';
            finalEl.textContent = score;
            document.getElementById('over').classList.remove('hidden');
        }
        
        document.getElementById('startBtn').onclick = start;
        document.getElementById('again').onclick = start;
        init();
    </script>
</body>
</html>
