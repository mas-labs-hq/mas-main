<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Breakout - MortApps Studios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --surface: #0f172a;
            --surface-light: #1e293b;
            --surface-lighter: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #2563eb;
            --accent-light: #3b82f6;
            --accent-dark: #1d4ed8;
            --accent-glow: rgba(37, 99, 235, 0.4);
            --border: rgba(51, 65, 85, 0.5);
            --font-display: 'Sora', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(37, 99, 235, 0.12), transparent),
                radial-gradient(ellipse 60% 40% at 80% 50%, rgba(139, 92, 246, 0.08), transparent),
                radial-gradient(ellipse 50% 30% at 20% 80%, rgba(37, 99, 235, 0.06), transparent),
                var(--bg);
        }

        .bg-mesh::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            color: var(--text);
            background: var(--surface-light);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            color: var(--text);
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .brand-icon svg {
            width: 18px;
            height: 18px;
        }

        .brand-text {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: -0.02em;
        }

        .stats-bar {
            display: flex;
            gap: 0.5rem;
        }

        .stat {
            text-align: center;
            background: var(--surface);
            padding: 0.4rem 0.9rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            min-width: 60px;
        }

        .stat-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .stat-value {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.15rem;
            color: var(--accent-light);
        }

        /* Game Container */
        .game-wrapper {
            padding-top: 70px;
            padding-bottom: 1rem;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .game-container {
            position: relative;
            background: linear-gradient(145deg, var(--surface), rgba(15, 23, 42, 0.8));
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 0.75rem;
            box-shadow:
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            max-width: calc(100vw - 1.5rem);
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
            border-radius: 12px;
            touch-action: none;
            background: #0a0f1e;
        }

        /* Overlays */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.95);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .overlay-content {
            text-align: center;
            padding: 2rem 1.5rem;
            max-width: 320px;
        }

        .overlay-icon {
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay-icon svg {
            width: 64px;
            height: 64px;
        }

        .overlay-title {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .overlay-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .btn {
            font-family: var(--font-body);
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.875rem 2rem;
            border-radius: 10px;
            font-size: 1rem;
        }

        .btn svg {
            flex-shrink: 0;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: white;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.45);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            padding: 0.75rem 1.5rem;
            background: var(--surface-light);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent-light);
        }

        .btn-row {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .score-large {
            font-family: var(--font-display);
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-light), #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0.5rem 0;
        }

        .game-footer {
            text-align: center;
            padding: 1.5rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            letter-spacing: 0.02em;
        }

        /* Touch Controls */
        .touch-controls {
            display: none;
            gap: 0.75rem;
            margin-top: 0.75rem;
            justify-content: center;
            align-items: center;
        }

        .touch-btn {
            width: 72px;
            height: 72px;
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .touch-btn svg {
            width: 28px;
            height: 28px;
            pointer-events: none;
        }

        .touch-btn:active {
            background: var(--accent);
            border-color: var(--accent);
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .touch-controls { display: flex; }
        }

        @media (max-width: 360px) {
            .header { padding: 0.5rem 0.6rem; }
            .brand-text { display: none; }
            .stat { padding: 0.3rem 0.6rem; min-width: 50px; }
            .game-container { padding: 0.5rem; border-radius: 14px; }
            .touch-btn { width: 64px; height: 64px; }
        }

        /* Particles container */
        .particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            border-radius: 12px;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            pointer-events: none;
            animation: particleFade 0.6s ease-out forwards;
        }

        @keyframes particleFade {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0) translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>

    <header class="header">
        <a href="../games.html" class="back-btn">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            Back
        </a>
        <a href="../index.html" class="brand">
            <div class="brand-icon">

                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="1" y="6" width="9" height="5" rx="1"/>

    <div class="game-wrapper">

            <!-- Start Overlay -->
            <div class="overlay" id="startOverlay">
                <div class="overlay-content">
                    <span class="overlay-icon">
                        <!-- SVG: Bricks -->
                        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="4" y="8" width="24" height="14" rx="3" fill="#3b82f6" stroke="#2563eb" stroke-width="1.5"/>
                            <rect x="36" y="8" width="24" height="14" rx="3" fill="#8b5cf6" stroke="#7c3aed" stroke-width="1.5"/>
                            <rect x="20" y="28" width="24" height="14" rx="3" fill="#ec4899" stroke="#db2777" stroke-width="1.5"/>
                            <rect x="4" y="48" width="16" height="10" rx="2" fill="#f59e0b" stroke="#d97706" stroke-width="1"/>
                            <rect x="24" y="48" width="16" height="10" rx="2" fill="#22c55e" stroke="#16a34a" stroke-width="1"/>
                            <rect x="44" y="28" width="16" height="14" rx="3" fill="#f97316" stroke="#ea580c" stroke-width="1.5"/>
                        </svg>
                    </span>
                    <h1 class="overlay-title">Breakout</h1>
                    <p class="overlay-subtitle">Smash all the bricks with your paddle. Don't let the ball fall!</p>
                    <button class="btn btn-primary" id="startBtn">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        Start Game
                    </button>
                    <p style="margin-top:1.5rem;font-size:0.8rem;color:var(--text-muted);">PC: Arrow keys &bull; Mobile: Touch or buttons</p>
                </div>
            </div>

            <!-- Game Over Overlay -->
            <div class="overlay hidden" id="gameOverOverlay">
                <div class="overlay-content">
                    <span class="overlay-icon">
                        <!-- SVG: Explosion -->
                        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M32 4l4 14 10-10-2 14 14-2-10 10 14 4-14 4 10 10-14-2 2 14-10-10-4 14-4-14-10 10 2-14-14 2 10-10L4 32l14-4L8 18l14 2L20 6l10 10L32 4z" fill="#f59e0b" stroke="#f97316" stroke-width="1.5" stroke-linejoin="round"/>
                            <circle cx="32" cy="32" r="8" fill="#fbbf24"/>
                            <circle cx="32" cy="32" r="4" fill="#fef3c7"/>
                        </svg>
                    </span>
                    <h1 class="overlay-title">Game Over</h1>
                    <div class="score-large" id="finalScore">0</div>
                    <div class="btn-row">
                        <button class="btn btn-primary" id="retryBtn">
                            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                            Play Again
                        </button>
                        <a href="../games.html" class="btn btn-secondary">
                            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4"/></svg>

        <div class="touch-controls">
            <button class="touch-btn" id="leftBtn" aria-label="Move Left">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <button class="touch-btn" id="rightBtn" aria-label="Move Right">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
            </button>
        </div>

    <footer class="game-footer">&copy; 2026 MortApps Studios</footer>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const particlesEl = document.getElementById('particles');

        // Base game constants (will be scaled)
        const BASE_W = 360, BASE_H = 480;
        const BRICK_ROWS = 5, BRICK_COLS = 8;
        const BRICK_PAD = 4, BRICK_TOP = 40;
        const BASE_PADDLE_W = 80, BASE_PADDLE_H = 12, BASE_BALL_R = 8;
        const colors = ['#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b', '#22c55e'];

        let scale = 1;
        let paddle, ball, bricks = [], score = 0, lives = 3, playing = false, animationId;
        let lastTime = 0, accumulator = 0;
        const FIXED_DT = 1000 / 60; // 60fps fixed timestep

        // Touch control state
        let touchLeft = false, touchRight = false;
        let touchInterval = null;

        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            const maxW = Math.min(window.innerWidth - 24, 380);
            // Subtract container padding (0.75rem * 2 = ~24px)
            const availW = maxW - 24;
            scale = availW / BASE_W;

            const w = Math.floor(BASE_W * scale);
            const h = Math.floor(BASE_H * scale);

            canvas.width = w;
            canvas.height = h;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';

            // Update particles container
            particlesEl.style.width = w + 'px';
            particlesEl.style.height = h + 'px';

            // Recalculate paddle & ball positions if game is in progress
            if (paddle) {
                paddle.w = BASE_PADDLE_W * scale;
                paddle.h = BASE_PADDLE_H * scale;
                paddle.y = h - 30 * scale;
                paddle.x = Math.min(paddle.x, w - paddle.w);
            }
            if (ball) {
                ball.r = BASE_BALL_R * scale;
            }

            // Rebuild bricks with new scale
            if (bricks.length > 0) {
                rebuildBricks();
            }

            if (!playing) draw();
        }

        function rebuildBricks() {
            const brickW = (canvas.width - (BRICK_COLS + 1) * BRICK_PAD * scale) / BRICK_COLS;
            const brickH = 18 * scale;
            for (let r = 0; r < BRICK_ROWS; r++) {
                for (let c = 0; c < BRICK_COLS; c++) {
                    if (bricks[r] && bricks[r][c]) {
                        bricks[r][c].x = c * (brickW + BRICK_PAD * scale) + BRICK_PAD * scale;
                        bricks[r][c].y = r * (brickH + BRICK_PAD * scale) + BRICK_TOP * scale;
                        bricks[r][c].w = brickW;
                        bricks[r][c].h = brickH;
                    }
                }
            }
        }

        function init() {
            const brickW = (canvas.width - (BRICK_COLS + 1) * BRICK_PAD * scale) / BRICK_COLS;
            const brickH = 18 * scale;

            bricks = [];
            for (let r = 0; r < BRICK_ROWS; r++) {
                bricks[r] = [];
                for (let c = 0; c < BRICK_COLS; c++) {
                    bricks[r][c] = {
                        x: c * (brickW + BRICK_PAD * scale) + BRICK_PAD * scale,
                        y: r * (brickH + BRICK_PAD * scale) + BRICK_TOP * scale,
                        w: brickW,
                        h: brickH,
                        alive: true,
                        color: colors[r],
                        row: r
                    };
                }
            }

            const pw = BASE_PADDLE_W * scale;
            const ph = BASE_PADDLE_H * scale;
            paddle = {
                x: canvas.width / 2 - pw / 2,
                y: canvas.height - 30 * scale,
                w: pw,
                h: ph
            };

            ball = {
                x: canvas.width / 2,
                y: canvas.height - 50 * scale,
                dx: 3 * scale * (Math.random() > 0.5 ? 1 : -1),
                dy: -3 * scale,
                r: BASE_BALL_R * scale
            };

            score = 0;
            lives = 3;
            updateUI();
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw subtle grid lines for depth
            ctx.strokeStyle = 'rgba(51, 65, 85, 0.15)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 30 * scale) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 30 * scale) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            // Draw bricks with gradients
            bricks.flat().forEach(b => {
                if (b.alive) {
                    const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
                    grad.addColorStop(0, b.color);
                    grad.addColorStop(1, darkenColor(b.color, 0.3));
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.roundRect(b.x, b.y, b.w, b.h, 4 * scale);
                    ctx.fill();

                    // Highlight on top
                    ctx.fillStyle = 'rgba(255,255,255,0.15)';
                    ctx.beginPath();
                    ctx.roundRect(b.x, b.y, b.w, b.h * 0.4, [4 * scale, 4 * scale, 0, 0]);
                    ctx.fill();
                }
            });

            // Draw paddle with gradient + glow
            const paddleGrad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x + paddle.w, paddle.y);
            paddleGrad.addColorStop(0, '#2563eb');
            paddleGrad.addColorStop(0.5, '#3b82f6');
            paddleGrad.addColorStop(1, '#2563eb');
            ctx.fillStyle = paddleGrad;
            ctx.beginPath();
            ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 6 * scale);
            ctx.fill();

            // Paddle glow
            ctx.shadowColor = 'rgba(37, 99, 235, 0.6)';
            ctx.shadowBlur = 12 * scale;
            ctx.fillStyle = 'rgba(59, 130, 246, 0.3)';
            ctx.beginPath();
            ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 6 * scale);
            ctx.fill();
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;

            // Draw ball with glow
            ctx.shadowColor = 'rgba(248, 250, 252, 0.8)';
            ctx.shadowBlur = 15 * scale;
            const ballGrad = ctx.createRadialGradient(ball.x - ball.r * 0.3, ball.y - ball.r * 0.3, 0, ball.x, ball.y, ball.r);
            ballGrad.addColorStop(0, '#ffffff');
            ballGrad.addColorStop(0.7, '#e2e8f0');
            ballGrad.addColorStop(1, '#94a3b8');
            ctx.fillStyle = ballGrad;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
            ctx.fill();

            // Outer glow ring
            ctx.shadowColor = 'rgba(59, 130, 246, 0.5)';
            ctx.shadowBlur = 8 * scale;
            ctx.strokeStyle = 'rgba(59, 130, 246, 0.3)';
            ctx.lineWidth = 2 * scale;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r + 2 * scale, 0, Math.PI * 2);
            ctx.stroke();

            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
        }

        function darkenColor(hex, amount) {
            const num = parseInt(hex.slice(1), 16);
            const r = Math.max(0, ((num >> 16) & 255) * (1 - amount));
            const g = Math.max(0, ((num >> 8) & 255) * (1 - amount));
            const b = Math.max(0, (num & 255) * (1 - amount));
            return '#' + ((1 << 24) + (Math.round(r) << 16) + (Math.round(g) << 8) + Math.round(b)).toString(16).slice(1);
        }

        function spawnParticles(x, y, color) {
            const count = 6;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const canvasRect = canvas.getBoundingClientRect();
                const containerRect = document.getElementById('gameContainer').getBoundingClientRect();
                const offsetX = canvasRect.left - containerRect.left;
                const offsetY = canvasRect.top - containerRect.top;
                p.style.left = (offsetX + x * (canvasRect.width / canvas.width)) + 'px';
                p.style.top = (offsetY + y * (canvasRect.height / canvas.height)) + 'px';
                p.style.backgroundColor = color;
                p.style.width = (3 + Math.random() * 4) + 'px';
                p.style.height = p.style.width;
                p.style.animationDuration = (0.3 + Math.random() * 0.4) + 's';
                const angle = Math.random() * Math.PI * 2;
                const dist = 10 + Math.random() * 20;
                p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
                p.style.animation = `particleFly 0.5s ease-out forwards`;
                particlesEl.appendChild(p);
                setTimeout(() => p.remove(), 600);
            }
        }

        // Add particle fly animation dynamically
        const particleStyle = document.createElement('style');
        particleStyle.textContent = `
            @keyframes particleFly {
                0% { opacity: 1; transform: translate(0, 0) scale(1); }
                100% { opacity: 0; transform: translate(var(--tx, 0), var(--ty, -20px)) scale(0); }
            }
        `;
        document.head.appendChild(particleStyle);

        function update(timestamp) {
            if (!playing) return;

            if (!lastTime) lastTime = timestamp;
            const delta = Math.min(timestamp - lastTime, 50); // cap delta
            lastTime = timestamp;

            accumulator += delta;

            while (accumulator >= FIXED_DT) {
                physicsTick();
                accumulator -= FIXED_DT;
            }

            draw();
            animationId = requestAnimationFrame(update);
        }

        function physicsTick() {
            const speed = scale;
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Wall collisions
            if (ball.x <= ball.r) { ball.x = ball.r; ball.dx = Math.abs(ball.dx); }
            if (ball.x >= canvas.width - ball.r) { ball.x = canvas.width - ball.r; ball.dx = -Math.abs(ball.dx); }
            if (ball.y <= ball.r) { ball.y = ball.r; ball.dy = Math.abs(ball.dy); }

            // Ball fell below
            if (ball.y >= canvas.height - ball.r) {
                lives--;
                updateUI();
                if (lives <= 0) {
                    gameOver();
                    return;
                }
                ball.x = canvas.width / 2;
                ball.y = canvas.height - 50 * scale;
                ball.dx = 3 * scale * (Math.random() > 0.5 ? 1 : -1);
                ball.dy = -3 * scale;
            }

            // Paddle collision
            if (ball.dy > 0 &&
                ball.y + ball.r >= paddle.y &&
                ball.y + ball.r <= paddle.y + paddle.h + 4 * scale &&
                ball.x >= paddle.x - ball.r &&
                ball.x <= paddle.x + paddle.w + ball.r) {
                ball.dy = -Math.abs(ball.dy);
                const hitPos = (ball.x - paddle.x) / paddle.w;
                ball.dx = (hitPos - 0.5) * 6 * scale;
                // Ensure minimum horizontal speed
                if (Math.abs(ball.dx) < 1 * scale) {
                    ball.dx = (ball.dx >= 0 ? 1 : -1) * scale;
                }
                ball.y = paddle.y - ball.r;
            }

            // Brick collision
            let allCleared = true;
            for (let r = 0; r < BRICK_ROWS; r++) {
                for (let c = 0; c < BRICK_COLS; c++) {
                    const b = bricks[r][c];
                    if (!b.alive) continue;
                    allCleared = false;

                    if (ball.x + ball.r >= b.x &&
                        ball.x - ball.r <= b.x + b.w &&
                        ball.y + ball.r >= b.y &&
                        ball.y - ball.r <= b.y + b.h) {

                        b.alive = false;
                        score += 10;
                        updateUI();

                        // Determine collision side
                        const overlapLeft = (ball.x + ball.r) - b.x;
                        const overlapRight = (b.x + b.w) - (ball.x - ball.r);
                        const overlapTop = (ball.y + ball.r) - b.y;
                        const overlapBottom = (b.y + b.h) - (ball.y - ball.r);
                        const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

                        if (minOverlap === overlapTop || minOverlap === overlapBottom) {
                            ball.dy *= -1;
                        } else {
                            ball.dx *= -1;
                        }

                        spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color);
                        break; // Only handle one brick collision per tick
                    }
                }
            }

            if (allCleared) {
                init();
                playing = true;
                ball.dx *= 1.15;
                ball.dy *= 1.15;
            }

            // Touch button movement
            if (touchLeft) {
                paddle.x = Math.max(0, paddle.x - 5 * scale);
            }
            if (touchRight) {
                paddle.x = Math.min(canvas.width - paddle.w, paddle.x + 5 * scale);
            }
        }

        function start() {
            init();
            playing = true;
            lastTime = 0;
            accumulator = 0;
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');
            animationId = requestAnimationFrame(update);
        }

        function gameOver() {
            playing = false;
            cancelAnimationFrame(animationId);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        // Keyboard controls
        document.addEventListener('keydown', e => {
            if (!playing) return;
            const moveSpeed = 20 * scale;
            if (e.key === 'ArrowLeft' && paddle.x > 0) {
                paddle.x = Math.max(0, paddle.x - moveSpeed);
                e.preventDefault();
            }
            if (e.key === 'ArrowRight' && paddle.x < canvas.width - paddle.w) {
                paddle.x = Math.min(canvas.width - paddle.w, paddle.x + moveSpeed);
                e.preventDefault();
            }
        });

        // Mouse control
        canvas.addEventListener('mousemove', e => {
            if (playing) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                paddle.x = (e.clientX - rect.left) * scaleX - paddle.w / 2;
                paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, paddle.x));
            }
        });

        // Touch drag on canvas
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            if (playing) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                paddle.x = (e.touches[0].clientX - rect.left) * scaleX - paddle.w / 2;
                paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, paddle.x));
            }
        }, { passive: false });

        // Touch buttons with continuous movement
        function startTouchLeft() {
            touchLeft = true;
        }
        function stopTouchLeft() {
            touchLeft = false;
        }
        function startTouchRight() {
            touchRight = true;
        }
        function stopTouchRight() {
            touchRight = false;
        }

        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');

        // Touch events for continuous movement
        leftBtn.addEventListener('touchstart', e => { e.preventDefault(); startTouchLeft(); }, { passive: false });
        leftBtn.addEventListener('touchend', e => { e.preventDefault(); stopTouchLeft(); }, { passive: false });
        leftBtn.addEventListener('touchcancel', stopTouchLeft);
        leftBtn.addEventListener('mousedown', startTouchLeft);
        leftBtn.addEventListener('mouseup', stopTouchLeft);
        leftBtn.addEventListener('mouseleave', stopTouchLeft);

        rightBtn.addEventListener('touchstart', e => { e.preventDefault(); startTouchRight(); }, { passive: false });
        rightBtn.addEventListener('touchend', e => { e.preventDefault(); stopTouchRight(); }, { passive: false });
        rightBtn.addEventListener('touchcancel', stopTouchRight);
        rightBtn.addEventListener('mousedown', startTouchRight);
        rightBtn.addEventListener('mouseup', stopTouchRight);
        rightBtn.addEventListener('mouseleave', stopTouchRight);

        // Button handlers
        document.getElementById('startBtn').onclick = start;
        document.getElementById('retryBtn').onclick = start;

        // Initial setup
        resizeCanvas();
        init();
        draw();

        // Handle resize
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                const oldW = canvas.width;
                resizeCanvas();
                // Adjust paddle position proportionally
                if (paddle) {
                    paddle.x = (paddle.x / oldW) * canvas.width;
                    paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, paddle.x));
                }
                if (ball) {
                    ball.x = (ball.x / oldW) * canvas.width;
                    ball.y = Math.min(ball.y, canvas.height - ball.r - 10);
                }
                if (!playing) draw();
            }, 100);
        });

        // Right-click protection
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
