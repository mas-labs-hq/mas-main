<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Street Racer - MortApps Studios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --surface: #0f172a;
            --surface-light: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #ef4444;
            --accent-light: #f87171;
            --accent-glow: rgba(239, 68, 68, 0.4);
            --border: rgba(51, 65, 85, 0.5);
            --font-display: 'Sora', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(239, 68, 68, 0.12), transparent),
                radial-gradient(ellipse 60% 40% at 80% 50%, rgba(248, 113, 113, 0.08), transparent),
                radial-gradient(ellipse 50% 30% at 20% 80%, rgba(185, 28, 28, 0.06), transparent),
                var(--bg);
        }
        
        .bg-mesh::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
        }
        
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .back-btn:hover {
            color: var(--text);
            background: var(--surface-light);
        }
        
        .brand {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            color: var(--text);
        }
        
        .brand-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }
        
        .brand-icon svg {
            width: 20px;
            height: 20px;
        }
        
        .brand-text {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1rem;
        }
        
        .stats {
            display: flex;
            gap: 1rem;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-label {
            font-size: 0.6rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .stat-value {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--accent-light);
            text-shadow: 0 0 12px var(--accent-glow);
        }
        
        .game-wrapper {
            padding-top: 60px;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }
        
        .game-container {
            position: relative;
            background: linear-gradient(145deg, var(--surface), rgba(15, 23, 42, 0.8));
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 0.5rem;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            overflow: hidden;
        }
        
        canvas {
            display: block;
            border-radius: 16px;
        }
        
        /* Controls */
        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        
        .ctrl-btn {
            width: 80px;
            height: 70px;
            min-width: 56px;
            min-height: 56px;
            background: linear-gradient(145deg, var(--surface-light), var(--surface));
            border: 2px solid var(--border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        .ctrl-btn svg {
            width: 36px;
            height: 36px;
            fill: var(--text);
            transition: fill 0.15s;
            pointer-events: none;
        }
        
        .ctrl-btn:active, .ctrl-btn.pressed {
            background: linear-gradient(145deg, var(--accent), #dc2626);
            border-color: var(--accent-light);
            transform: scale(0.95);
        }
        
        .ctrl-btn:active svg, .ctrl-btn.pressed svg {
            fill: white;
        }
        
        /* Overlays */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            z-index: 10;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .overlay-content {
            text-align: center;
            padding: 2rem;
            max-width: 280px;
        }
        
        .overlay-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .overlay-icon svg {
            width: 64px;
            height: 64px;
        }
        
        .overlay-icon.race svg {
            filter: drop-shadow(0 0 12px rgba(239, 68, 68, 0.5));
            animation: pulseRed 2s ease-in-out infinite;
        }
        
        .overlay-icon.explode svg {
            filter: drop-shadow(0 0 12px rgba(251, 191, 36, 0.5));
        }
        
        @keyframes pulseRed {
            0%, 100% { filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0.4)); }
            50% { filter: drop-shadow(0 0 20px rgba(239, 68, 68, 0.8)); }
        }
        
        .overlay-title {
            font-family: var(--font-display);
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .overlay-subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }
        
        .score-large {
            font-family: var(--font-display);
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-light), #fca5a5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0.5rem 0;
        }
        
        .high-score {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin: 1rem 0;
            padding: 0.5rem 1rem;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 8px;
        }
        
        .high-score-icon svg {
            width: 20px;
            height: 20px;
        }
        
        .high-score-text {
            font-family: var(--font-display);
            font-weight: 700;
            color: #f59e0b;
        }
        
        .new-best {
            animation: flashGold 0.5s ease 3;
        }
        
        @keyframes flashGold {
            0%, 100% { border-color: rgba(245, 158, 11, 0.3); }
            50% { border-color: rgba(245, 158, 11, 0.8); box-shadow: 0 0 20px rgba(245, 158, 11, 0.3); }
        }
        
        .btn {
            font-family: var(--font-body);
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn svg {
            width: 18px;
            height: 18px;
        }
        
        .btn-primary {
            padding: 0.875rem 2rem;
            background: linear-gradient(135deg, var(--accent), #dc2626);
            color: white;
            border-radius: 12px;
            font-size: 1rem;
            box-shadow: 0 4px 15px var(--accent-glow);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-row {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            margin-top: 1rem;
        }
        
        .btn-secondary {
            padding: 0.75rem 1.5rem;
            background: var(--surface-light);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 0.9rem;
            text-decoration: none;
        }
        
        .btn-secondary:hover {
            background: var(--surface);
            border-color: var(--accent);
        }
        
        .game-footer {
            text-align: center;
            padding: 0.75rem;
            color: var(--text-muted);
            font-size: 0.75rem;
        }
        
        .hint {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-align: center;
        }
        
        @media (max-width: 400px) {
            .header { padding: 0.6rem 0.8rem; }
            .brand-text { display: none; }
            .stats { gap: 0.5rem; }
            .stat-value { font-size: 1rem; }
            .ctrl-btn { width: 70px; height: 60px; }
            .ctrl-btn svg { width: 30px; height: 30px; }
            .overlay-content { padding: 1.5rem; }
            .overlay-title { font-size: 1.5rem; }
            .score-large { font-size: 2.5rem; }
        }
        
        @media (max-width: 340px) {
            .ctrl-btn { width: 60px; height: 56px; min-width: 56px; min-height: 56px; border-radius: 12px; }
            .ctrl-btn svg { width: 28px; height: 28px; }
            .game-wrapper { gap: 0.5rem; }
        }
        
        @media (max-height: 600px) and (orientation: landscape) {
            .game-wrapper { padding-top: 55px; gap: 0.4rem; }
            .overlay-content { padding: 1rem; }
            .overlay-icon { width: 48px; height: 48px; margin-bottom: 0.5rem; }
            .overlay-icon svg { width: 40px; height: 40px; }
            .overlay-title { font-size: 1.25rem; }
            .score-large { font-size: 2rem; }
        }
    </style>
</head>

    <script>
        // Prevent right-click
        document.addEventListener('contextmenu', e => e.preventDefault());
        
        // Canvas setup
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        // Game dimensions (internal coordinate system)
        const LANES = 4;
        const GW = 280, GH = 480;
        let canvasWidth, canvasHeight;
        let laneWidth, carWidth, carHeight;
        let dpr = 1;
        let renderScale = 1;
        
        // Game state
        let player = { lane: 1, y: 0, targetX: 0, currentX: 0 };
        let obstacles = [];
        let coins = [];
        let speedLines = [];
        let particles = [];
        let roadOffset = 0;
        let score = 0;
        let highScore = 0;
        let playing = false;
        let gameSpeed = 4;
        let animFrame = null;
        let lastObstacle = 0;
        let lastCoin = 0;
        let gameStartTime = 0;
        let lastTime = 0;
        
        // Colors
        const COLORS = {
            road: '#1a1a2e',
            lane: '#2d2d44',
            stripe: '#4a4a6a',
            player: '#ef4444',
            playerAccent: '#fca5a5',
            obstacle: ['#3b82f6', '#22c55e', '#f59e0b', '#8b5cf6'],
            coin: '#fbbf24',
            coinGlow: 'rgba(251, 191, 36, 0.5)'
        };
        
        // Load high score
        highScore = parseInt(localStorage.getItem('streetRacer_high') || '0');
        document.getElementById('highScore').textContent = highScore;
        
        // Resize canvas (adaptive)
        function resizeCanvas() {
            dpr = Math.min(window.devicePixelRatio || 1, 2);
            
            const headerH = 60;
            const footerH = 100; // controls + hint + footer
            const padding = 32;
            const containerPad = 16;
            
            const availW = window.innerWidth - padding - containerPad;
            const availH = window.innerHeight - headerH - footerH - padding - containerPad;
            
            const ratio = GW / GH;
            let w, h;
            
            if (availW / availH > ratio) {
                h = Math.max(availH, 200);
                w = h * ratio;
            } else {
                w = Math.max(availW, 200);
                h = w / ratio;
            }
            
            canvasWidth = w;
            canvasHeight = h;
            renderScale = w / GW;
            
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            
            ctx.setTransform(dpr * renderScale, 0, 0, dpr * renderScale, 0, 0);
            
            laneWidth = GW / LANES;
            carWidth = laneWidth * 0.6;
            carHeight = carWidth * 1.8;
            player.y = GH - carHeight - 30;
            player.targetX = player.lane * laneWidth + (laneWidth - carWidth) / 2;
            player.currentX = player.targetX;
            
            if (!playing) draw();
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));
        
        // Speed lines system
        function spawnSpeedLine() {
            const lane = Math.floor(Math.random() * LANES);
            speedLines.push({
                x: lane * laneWidth + laneWidth / 2 + (Math.random() - 0.5) * 10,
                y: -10,
                speed: gameSpeed * (1.2 + Math.random() * 0.8),
                length: 15 + Math.random() * 25,
                alpha: 0.15 + Math.random() * 0.15
            });
        }
        
        function updateSpeedLines(dt) {
            // Spawn rate increases with speed
            if (Math.random() < 0.15 * (gameSpeed / 4)) {
                spawnSpeedLine();
            }
            
            for (let i = speedLines.length - 1; i >= 0; i--) {
                speedLines[i].y += speedLines[i].speed * dt;
                if (speedLines[i].y > GH + 30) {
                    speedLines.splice(i, 1);
                }
            }
        }
        
        function drawSpeedLines() {
            speedLines.forEach(sl => {
                ctx.globalAlpha = sl.alpha;
                ctx.strokeStyle = '#94a3b8';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(sl.x, sl.y);
                ctx.lineTo(sl.x, sl.y + sl.length);
                ctx.stroke();
            });
            ctx.globalAlpha = 1;
        }
        
        // Particle system
        function spawnParticles(px, py, count, color1, color2) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 3 + 1;
                particles.push({
                    x: px, y: py,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1,
                    decay: Math.random() * 0.03 + 0.02,
                    size: Math.random() * 3 + 1.5,
                    color: Math.random() > 0.5 ? color1 : color2
                });
            }
        }
        
        function spawnCoinParticle(px, py) {
            for (let i = 0; i < 8; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 2 + 1;
                particles.push({
                    x: px, y: py,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1,
                    decay: 0.04 + Math.random() * 0.02,
                    size: Math.random() * 2.5 + 1,
                    color: Math.random() > 0.5 ? '#fbbf24' : '#fef08a'
                });
            }
        }
        
        function updateParticles(dt) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.life -= p.decay * dt;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }
        
        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life * 0.8;
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 4;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }
        
        // Draw functions
        function drawRoad() {
            // Road background gradient
            const roadGrad = ctx.createLinearGradient(0, 0, 0, GH);
            roadGrad.addColorStop(0, '#12121e');
            roadGrad.addColorStop(1, COLORS.road);
            ctx.fillStyle = roadGrad;
            ctx.fillRect(0, 0, GW, GH);
            
            // Lane dividers
            ctx.strokeStyle = COLORS.stripe;
            ctx.lineWidth = 2;
            ctx.setLineDash([18, 18]);
            
            for (let i = 1; i < LANES; i++) {
                const lx = i * laneWidth;
                ctx.beginPath();
                ctx.moveTo(lx, (-roadOffset % 36) - 18);
                ctx.lineTo(lx, GH);
                ctx.stroke();
            }
            
            ctx.setLineDash([]);
            
            // Road edges with glow
            ctx.shadowColor = 'rgba(245, 158, 11, 0.4)';
            ctx.shadowBlur = 8;
            ctx.fillStyle = '#f59e0b';
            ctx.fillRect(0, 0, 3, GH);
            ctx.fillRect(GW - 3, 0, 3, GH);
            ctx.shadowBlur = 0;
            
            // Edge rumble strips
            const stripH = 12;
            const offset = roadOffset % (stripH * 2);
            ctx.fillStyle = 'rgba(245, 158, 11, 0.2)';
            for (let y = -offset; y < GH; y += stripH * 2) {
                ctx.fillRect(3, y, 5, stripH);
                ctx.fillRect(GW - 8, y, 5, stripH);
            }
        }
        
        function drawCar(cx, cy, color, accent, isPlayer = false) {
            // Car shadow
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.beginPath();
            ctx.roundRect(cx + 2, cy + 2, carWidth, carHeight, 6);
            ctx.fill();
            
            // Car body
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.roundRect(cx, cy, carWidth, carHeight, 6);
            ctx.fill();
            
            // Body highlight
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.beginPath();
            ctx.roundRect(cx + 2, cy + 2, carWidth - 4, carHeight * 0.4, [4, 4, 0, 0]);
            ctx.fill();
            
            // Windshield
            ctx.fillStyle = '#1a1a2e';
            const wsY = isPlayer ? cy + carHeight * 0.15 : cy + carHeight * 0.55;
            const wsH = carHeight * 0.25;
            ctx.beginPath();
            ctx.roundRect(cx + carWidth * 0.15, wsY, carWidth * 0.7, wsH, 3);
            ctx.fill();
            
            // Windshield reflection
            ctx.fillStyle = 'rgba(100, 150, 255, 0.15)';
            ctx.beginPath();
            ctx.roundRect(cx + carWidth * 0.18, wsY + 2, carWidth * 0.25, wsH * 0.6, 2);
            ctx.fill();
            
            // Car accent stripe
            ctx.fillStyle = accent || '#fff';
            ctx.fillRect(cx + carWidth * 0.1, cy + carHeight * 0.4, carWidth * 0.8, 3);
            
            // Lights
            if (isPlayer) {
                // Headlights with glow
                ctx.shadowColor = 'rgba(254, 240, 138, 0.6)';
                ctx.shadowBlur = 8;
                ctx.fillStyle = '#fef08a';
                ctx.beginPath();
                ctx.arc(cx + carWidth * 0.25, cy + 6, 3.5, 0, Math.PI * 2);
                ctx.arc(cx + carWidth * 0.75, cy + 6, 3.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            } else {
                // Taillights
                ctx.shadowColor = 'rgba(239, 68, 68, 0.5)';
                ctx.shadowBlur = 6;
                ctx.fillStyle = '#ef4444';
                ctx.beginPath();
                ctx.arc(cx + carWidth * 0.25, cy + carHeight - 6, 3, 0, Math.PI * 2);
                ctx.arc(cx + carWidth * 0.75, cy + carHeight - 6, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }
        
        function drawCoin(coin) {
            const size = laneWidth * 0.25;
            
            // Glow
            ctx.shadowColor = COLORS.coinGlow;
            ctx.shadowBlur = 12;
            
            // Outer ring
            ctx.fillStyle = COLORS.coin;
            ctx.beginPath();
            ctx.arc(coin.x, coin.y, size, 0, Math.PI * 2);
            ctx.fill();
            
            // Inner circle
            ctx.fillStyle = '#fcd34d';
            ctx.beginPath();
            ctx.arc(coin.x, coin.y, size * 0.65, 0, Math.PI * 2);
            ctx.fill();
            
            // $ symbol
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#92400e';
            ctx.font = `bold ${size}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('$', coin.x, coin.y + 1);
        }
        
        function draw() {
            drawRoad();
            drawSpeedLines();
            
            // Draw coins
            coins.forEach(drawCoin);
            
            // Draw obstacles
            obstacles.forEach(obs => {
                const ox = obs.lane * laneWidth + (laneWidth - carWidth) / 2;
                drawCar(ox, obs.y, COLORS.obstacle[obs.colorIndex], null, false);
            });
            
            // Draw player (smooth interpolation)
            player.currentX += (player.targetX - player.currentX) * 0.25;
            drawCar(player.currentX, player.y, COLORS.player, COLORS.playerAccent, true);
            
            // Draw particles on top
            drawParticles();
        }
        
        // Game logic
        function spawnObstacle() {
            const lane = Math.floor(Math.random() * LANES);
            
            // Don't block all lanes - check recent obstacles
            const recentLanes = obstacles
                .filter(o => o.y < carHeight * 2)
                .map(o => o.lane);
            
            // If 3 lanes already blocked, ensure at least one free
            if (recentLanes.length >= LANES - 1) {
                const freeLanes = [];
                for (let i = 0; i < LANES; i++) {
                    if (!recentLanes.includes(i)) freeLanes.push(i);
                }
                if (freeLanes.length > 0) return; // skip spawn
            }
            
            obstacles.push({
                lane: lane,
                y: -carHeight - 20,
                colorIndex: Math.floor(Math.random() * COLORS.obstacle.length)
            });
        }
        
        function spawnCoin() {
            const lane = Math.floor(Math.random() * LANES);
            coins.push({
                lane: lane,
                x: lane * laneWidth + laneWidth / 2,
                y: -20
            });
        }
        
        function checkCollision() {
            const playerLeft = player.currentX;
            const playerRight = playerLeft + carWidth;
            const playerTop = player.y;
            const playerBottom = player.y + carHeight;
            
            for (const obs of obstacles) {
                const obsLeft = obs.lane * laneWidth + (laneWidth - carWidth) / 2;
                const obsRight = obsLeft + carWidth;
                const obsTop = obs.y;
                const obsBottom = obs.y + carHeight;
                
                // AABB collision with slight margin for fairness
                if (playerLeft + 4 < obsRight - 2 && playerRight - 4 > obsLeft + 2 &&
                    playerTop + 4 < obsBottom - 2 && playerBottom - 4 > obsTop + 2) {
                    return true;
                }
            }
            
            return false;
        }
        
        function checkCoinCollection() {
            const playerCX = player.currentX + carWidth / 2;
            const playerCY = player.y + carHeight / 2;
            
            for (let i = coins.length - 1; i >= 0; i--) {
                const coin = coins[i];
                const dx = coin.x - playerCX;
                const dy = coin.y - playerCY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < carWidth * 0.7) {
                    spawnCoinParticle(coin.x, coin.y);
                    coins.splice(i, 1);
                    score += 50;
                    updateScore();
                }
            }
        }
        
        function updateScore() {
            document.getElementById('score').textContent = score;
        }
        
        // Difficulty curve - easier at start
        function getEffectiveSpeed() {
            const elapsed = (Date.now() - gameStartTime) / 1000;
            // First 30 seconds: gradual ramp from 3 to 4
            if (elapsed < 30) {
                return 3 + (gameSpeed - 3) * (elapsed / 30);
            }
            return gameSpeed;
        }
        
        function getObstacleInterval() {
            const elapsed = (Date.now() - gameStartTime) / 1000;
            // First 30 seconds: spawn less frequently
            if (elapsed < 30) {
                return 80 - Math.floor((elapsed / 30) * 20); // 80 down to 60
            }
            return 60;
        }
        
        function update(timestamp) {
            if (!playing) return;
            
            if (!lastTime) lastTime = timestamp;
            const delta = timestamp - lastTime;
            lastTime = timestamp;
            
            if (delta > 100) {
                animFrame = requestAnimationFrame(update);
                return;
            }
            
            const targetDelta = 1000 / 60;
            const dt = Math.min(delta / targetDelta, 2);
            
            const effectiveSpeed = getEffectiveSpeed();
            
            // Move road
            roadOffset += effectiveSpeed * dt;
            
            // Update score (distance)
            score += Math.round(dt);
            updateScore();
            
            // Spawn obstacles
            lastObstacle++;
            const spawnInterval = getObstacleInterval();
            if (lastObstacle > spawnInterval) {
                spawnObstacle();
                lastObstacle = 0;
            }
            
            // Spawn coins
            lastCoin++;
            if (lastCoin > 45) {
                if (Math.random() > 0.4) {
                    spawnCoin();
                }
                lastCoin = 0;
            }
            
            // Move obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].y += effectiveSpeed * dt;
                if (obstacles[i].y > GH + 20) {
                    obstacles.splice(i, 1);
                }
            }
            
            // Move coins
            for (let i = coins.length - 1; i >= 0; i--) {
                coins[i].y += effectiveSpeed * dt;
                if (coins[i].y > GH + 20) {
                    coins.splice(i, 1);
                }
            }
            
            // Update speed lines
            updateSpeedLines(dt);
            
            // Update particles
            updateParticles(dt);
            
            // Check collisions
            if (checkCollision()) {
                gameOver();
                return;
            }
            
            // Check coin collection
            checkCoinCollection();
            
            // Increase difficulty over time
            const elapsed = (Date.now() - gameStartTime) / 1000;
            if (elapsed > 30 && score % 500 === 0 && gameSpeed < 10) {
                gameSpeed += 0.15;
            }
            
            draw();
            animFrame = requestAnimationFrame(update);
        }
        
        function startGame() {
            player = { lane: 1, y: 0, targetX: 0, currentX: 0 };
            obstacles = [];
            coins = [];
            speedLines = [];
            particles = [];
            roadOffset = 0;
            score = 0;
            gameSpeed = 4;
            lastObstacle = 0;
            lastCoin = 0;
            lastTime = 0;
            gameStartTime = Date.now();
            playing = true;
            
            // Recalculate player position
            laneWidth = GW / LANES;
            carWidth = laneWidth * 0.6;
            carHeight = carWidth * 1.8;
            player.y = GH - carHeight - 30;
            player.targetX = player.lane * laneWidth + (laneWidth - carWidth) / 2;
            player.currentX = player.targetX;
            
            updateScore();
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');
            
            animFrame = requestAnimationFrame(update);
        }
        
        function gameOver() {
            playing = false;
            lastTime = 0;
            if (animFrame) {
                cancelAnimationFrame(animFrame);
                animFrame = null;
            }
            
            // Crash particles
            const px = player.currentX + carWidth / 2;
            const py = player.y + carHeight / 2;
            spawnParticles(px, py, 20, '#ef4444', '#fbbf24');
            spawnParticles(px, py, 10, '#f97316', '#fef08a');
            
            // Draw final frame
            updateParticles(1);
            draw();
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('streetRacer_high', highScore);
                document.getElementById('highScore').textContent = highScore;
                document.getElementById('highScoreBox').classList.add('new-best');
                setTimeout(() => document.getElementById('highScoreBox').classList.remove('new-best'), 1500);
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('bestScore').textContent = 'Best: ' + highScore;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }
        
        function moveLeft() {
            if (!playing) return;
            if (player.lane > 0) {
                player.lane--;
                player.targetX = player.lane * laneWidth + (laneWidth - carWidth) / 2;
            }
        }
        
        function moveRight() {
            if (!playing) return;
            if (player.lane < LANES - 1) {
                player.lane++;
                player.targetX = player.lane * laneWidth + (laneWidth - carWidth) / 2;
            }
        }
        
        // Event listeners
        document.getElementById('startBtn').onclick = startGame;
        document.getElementById('retryBtn').onclick = startGame;
        
        // Mouse clicks for controls
        document.getElementById('leftBtn').onclick = moveLeft;
        document.getElementById('rightBtn').onclick = moveRight;
        
        // Touch events with preventDefault for responsive controls
        document.getElementById('leftBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveLeft();
            document.getElementById('leftBtn').classList.add('pressed');
        }, { passive: false });
        
        document.getElementById('leftBtn').addEventListener('touchend', () => {
            document.getElementById('leftBtn').classList.remove('pressed');
        });
        
        document.getElementById('rightBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveRight();
            document.getElementById('rightBtn').classList.add('pressed');
        }, { passive: false });
        
        document.getElementById('rightBtn').addEventListener('touchend', () => {
            document.getElementById('rightBtn').classList.remove('pressed');
        });
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                moveLeft();
                e.preventDefault();
            }
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                moveRight();
                e.preventDefault();
            }
            if (e.key === ' ' && !playing) {
                startGame();
                e.preventDefault();
            }
        });
        
        // Touch swipe on canvas
        let touchStartX = 0;
        
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        }, { passive: true });
        
        canvas.addEventListener('touchend', (e) => {
            if (!playing) return;
            const touchEndX = e.changedTouches[0].clientX;
            const diff = touchEndX - touchStartX;
            
            if (Math.abs(diff) > 25) {
                if (diff > 0) moveRight();
                else moveLeft();
            }
        }, { passive: true });
        
        // Initial draw
        draw();
    </script>
</body>
</html>
