<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Flappy Ball - MortApps Studios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --surface: #0f172a;
            --surface-light: #1e293b;
            --surface-lighter: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #06b6d4;
            --accent-light: #22d3ee;
            --accent-glow: rgba(6, 182, 212, 0.4);
            --border: rgba(51, 65, 85, 0.5);
            --font-display: 'Sora', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        /* Premium Background */
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(6, 182, 212, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 80% 50%, rgba(34, 211, 238, 0.1), transparent),
                radial-gradient(ellipse 50% 30% at 20% 80%, rgba(8, 145, 178, 0.08), transparent),
                var(--bg);
        }
        
        .bg-mesh::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
        }
        
        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        
        .back-btn:hover {
            color: var(--text);
            background: var(--surface-light);
        }
        
        .brand {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            color: var(--text);
        }
        
        .brand-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
        }
        
        .brand-icon svg {
            width: 20px;
            height: 20px;
        }
        
        .brand-text {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: -0.02em;
        }
        
        .score-display {
            font-family: var(--font-display);
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--accent-light);
            text-shadow: 0 0 20px var(--accent-glow);
        }
        
        /* Game Container */
        .game-wrapper {
            padding-top: 60px;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .game-container {
            position: relative;
            background: linear-gradient(145deg, var(--surface), rgba(15, 23, 42, 0.8));
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 0.5rem;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            overflow: hidden;
        }
        
        canvas {
            display: block;
            border-radius: 20px;
        }
        
        /* Overlays */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            z-index: 10;
            opacity: 1;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .overlay-content {
            text-align: center;
            padding: 2rem;
            max-width: 300px;
        }
        
        .overlay-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .overlay-icon.bounce {
            animation: bounce 0.6s ease infinite;
        }
        
        .overlay-icon.bounce svg {
            width: 64px;
            height: 64px;
            filter: drop-shadow(0 0 12px rgba(251, 191, 36, 0.5));
        }
        
        .overlay-icon.explode svg {
            width: 64px;
            height: 64px;
            filter: drop-shadow(0 0 12px rgba(239, 68, 68, 0.5));
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        @keyframes pulseGlow {
            0%, 100% { filter: drop-shadow(0 0 8px rgba(6, 182, 212, 0.4)); }
            50% { filter: drop-shadow(0 0 20px rgba(6, 182, 212, 0.8)); }
        }
        
        .overlay-title {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .overlay-subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }
        
        .score-large {
            font-family: var(--font-display);
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-light), #0891b2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0.5rem 0;
        }
        
        .score-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        .high-score {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin: 1rem 0;
            padding: 0.5rem 1rem;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 8px;
        }
        
        .high-score-icon svg {
            width: 20px;
            height: 20px;
        }
        
        .high-score-text {
            font-family: var(--font-display);
            font-weight: 700;
            color: #f59e0b;
        }
        
        /* Buttons */
        .btn {
            font-family: var(--font-body);
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-primary {
            padding: 0.875rem 2rem;
            background: linear-gradient(135deg, var(--accent), #0891b2);
            color: white;
            border-radius: 12px;
            font-size: 1rem;
            box-shadow: 0 4px 15px var(--accent-glow);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-primary svg {
            width: 18px;
            height: 18px;
        }
        
        /* New high score flash */
        .new-best {
            animation: flashGold 0.5s ease 3;
        }
        
        @keyframes flashGold {
            0%, 100% { border-color: rgba(245, 158, 11, 0.3); }
            50% { border-color: rgba(245, 158, 11, 0.8); box-shadow: 0 0 20px rgba(245, 158, 11, 0.3); }
        }
        
        /* Footer */
        .game-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            padding: 1rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            letter-spacing: 0.02em;
            background: linear-gradient(to top, var(--bg), transparent);
        }
        
        /* Responsive */
        @media (max-width: 400px) {
            .header { padding: 0.6rem 0.8rem; }
            .brand-text { display: none; }
            .score-display { font-size: 1.5rem; }
            .overlay-content { padding: 1.5rem; }
            .overlay-title { font-size: 1.75rem; }
            .score-large { font-size: 3rem; }
            .overlay-icon { width: 60px; height: 60px; }
            .overlay-icon.bounce svg,
            .overlay-icon.explode svg { width: 48px; height: 48px; }
        }
        
        @media (max-height: 600px) and (orientation: landscape) {
            .game-wrapper { padding-top: 55px; }
            .overlay-content { padding: 1rem; }
            .overlay-icon { width: 48px; height: 48px; margin-bottom: 0.5rem; }
            .overlay-icon.bounce svg,
            .overlay-icon.explode svg { width: 36px; height: 36px; }
            .overlay-title { font-size: 1.5rem; }
            .score-large { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    
    <header class="header">
        <a href="../games.html" class="back-btn">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            Back
        </a>
        <a href="../index.html" class="brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M16.5 8.5C16.5 6.01 14.49 4 12 4C9.51 4 7.5 6.01 7.5 8.5C7.5 11.5 12 15 12 15C12 15 16.5 11.5 16.5 8.5Z" fill="#fef08a" stroke="#fbbf24" stroke-width="1.2"/>
                    <circle cx="13" cy="7.5" r="1.5" fill="#1f2937"/>
                    <path d="M14.5 9.5L18 10.5L14.5 11.5" fill="#f97316" stroke="#ea580c" stroke-width="0.5"/>
                    <path d="M4 12C4 12 6 10 8 11C10 12 9 14 7 13.5C5 13 4 12 4 12Z" fill="#f59e0b" stroke="#d97706" stroke-width="0.5"/>
                </svg>
            </div>

    </header>
    
    <div class="game-wrapper">
        <div class="game-container" id="gameContainer">
            <canvas id="c"></canvas>
            
            <div class="overlay" id="start">
                <div class="overlay-content">
                    <div class="overlay-icon bounce">
                        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <ellipse cx="32" cy="36" rx="16" ry="14" fill="#fbbf24"/>
                            <ellipse cx="32" cy="36" rx="16" ry="14" fill="url(#birdGrad1)"/>
                            <ellipse cx="32" cy="40" rx="10" ry="6" fill="#f59e0b"/>
                            <circle cx="39" cy="31" r="6" fill="white"/>
                            <circle cx="40.5" cy="31" r="3" fill="#1f2937"/>
                            <circle cx="41.5" cy="29.5" r="1" fill="white"/>
                            <path d="M46 34L56 36.5L46 39Z" fill="#f97316" stroke="#ea580c" stroke-width="0.8"/>
                            <ellipse cx="24" cy="40" rx="9" ry="5" fill="#f59e0b" transform="rotate(-15 24 40)"/>
                            <defs>
                                <radialGradient id="birdGrad1" cx="0.4" cy="0.3">
                                    <stop offset="0%" stop-color="#fef08a"/>
                                    <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
                                </radialGradient>
                            </defs>
                        </svg>
                    </div>
                    <h1 class="overlay-title">Flappy Ball</h1>
                    <p class="overlay-subtitle">Tap or press Space to fly through the pipes!</p>
                    <button class="btn btn-primary" id="startBtn">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        Start Game
                    </button>
                </div>
            </div>
            
            <div class="overlay hidden" id="over">
                <div class="overlay-content">
                    <div class="overlay-icon explode">
                        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M32 4L36 20L48 8L40 22L58 18L44 28L60 32L44 36L58 46L40 38L48 56L36 44L32 60L28 44L16 56L24 38L4 46L20 36L4 32L20 28L4 18L24 22L16 8L28 20Z" fill="#ef4444"/>
                            <path d="M32 10L35 22L44 14L38 24L52 20L42 28L54 32L42 36L52 44L38 36L44 52L35 42L32 54L29 42L20 52L26 36L12 44L22 36L10 32L22 28L12 20L26 24L20 14L29 22Z" fill="#fbbf24"/>
                            <circle cx="32" cy="32" r="8" fill="#f97316"/>
                            <circle cx="32" cy="32" r="4" fill="#fef08a"/>
                        </svg>
                    </div>
                    <h1 class="overlay-title">Game Over</h1>
                    <div class="score-label">Score</div>
                    <div class="score-large" id="final">0</div>
                    <div class="high-score" id="highScoreBox">
                        <span class="high-score-icon">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M5 4H19V6H5V4ZM6 6V14C6 14 9 16 12 16C15 16 18 14 18 14V6H6Z" fill="#f59e0b"/>
                                <path d="M10 16V20H14V16" fill="#d97706"/>
                                <ellipse cx="12" cy="11" rx="3" ry="3" fill="#fbbf24"/>
                                <path d="M12 8V11L14 12.5" stroke="#d97706" stroke-width="1" stroke-linecap="round"/>
                            </svg>
                        </span>
                        <span class="high-score-text" id="high">Best: 0</span>
                    </div>
                    <button class="btn btn-primary" id="retryBtn">
                        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                            <path d="M17.65 6.35A7.958 7.958 0 0 0 12 4C7.58 4 4.01 7.58 4.01 12S7.58 20 12 20C15.73 20 18.84 17.45 19.73 14H17.65C16.83 16.33 14.61 18 12 18C8.69 18 6 15.31 6 12S8.69 6 12 6C13.66 6 15.14 6.69 16.22 7.78L13 11H20V4L17.65 6.35Z"/>
                        </svg>
                        Try Again
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <footer class="game-footer">&copy; 2026 MortApps Studios</footer>
    
    <script>
        // SVG icon templates for canvas rendering
        const ICONS = {
            trophy: '<svg viewBox="0 0 24 24" fill="none"><path d="M5 4H19V6H5V4ZM6 6V14C6 14 9 16 12 16C15 16 18 14 18 14V6H6Z" fill="#f59e0b"/><path d="M10 16V20H14V16" fill="#d97706"/><ellipse cx="12" cy="11" rx="3" ry="3" fill="#fbbf24"/></svg>'
        };

        const cv = document.getElementById('c');
        const x = cv.getContext('2d');
        const container = document.getElementById('gameContainer');
        
        // Internal game coordinate system
        const GW = 360, GH = 540;
        const G = 0.4, P = 150, S = 2.5;
        
        let bird, pipes, score, high, playing, loop;
        let particles = [];
        let scale = 1;
        let dpr = 1;
        
        // Initialize high score
        high = parseInt(localStorage.getItem('flappy_high')) || 0;
        document.getElementById('high').textContent = 'Best: ' + high;
        
        // Adaptive canvas sizing
        function resizeCanvas() {
            dpr = Math.min(window.devicePixelRatio || 1, 2);
            
            const headerH = 60;
            const footerH = 40;
            const padding = 32;
            const containerPad = 16; // 0.5rem * 2
            
            const availW = window.innerWidth - padding - containerPad;
            const availH = window.innerHeight - headerH - footerH - padding - containerPad;
            
            const ratio = GW / GH;
            let w, h;
            
            if (availW / availH > ratio) {
                h = availH;
                w = h * ratio;
            } else {
                w = availW;
                h = w / ratio;
            }
            
            // Ensure minimum playable size
            w = Math.max(w, 240);
            h = w / ratio;
            
            scale = w / GW;
            
            cv.style.width = w + 'px';
            cv.style.height = h + 'px';
            cv.width = w * dpr;
            cv.height = h * dpr;
            
            x.setTransform(dpr * scale, 0, 0, dpr * scale, 0, 0);
            
            // Redraw if not playing
            if (!playing) draw();
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));
        
        // Particle system
        function spawnParticles(px, py, count, color1, color2) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 3 + 1;
                particles.push({
                    x: px, y: py,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1,
                    decay: Math.random() * 0.03 + 0.015,
                    size: Math.random() * 4 + 2,
                    color: Math.random() > 0.5 ? color1 : color2
                });
            }
        }
        
        function spawnTrailParticle() {
            particles.push({
                x: bird.x - 8 + Math.random() * 4,
                y: bird.y + Math.random() * 6 - 3,
                vx: -Math.random() * 1.5 - 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                life: 1,
                decay: 0.04 + Math.random() * 0.02,
                size: Math.random() * 3 + 1.5,
                color: Math.random() > 0.5 ? '#fbbf24' : '#f59e0b'
            });
        }
        
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= p.decay;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }
        
        function drawParticles() {
            particles.forEach(p => {
                x.globalAlpha = p.life * 0.8;
                x.fillStyle = p.color;
                x.shadowColor = p.color;
                x.shadowBlur = 6;
                x.beginPath();
                x.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                x.fill();
            });
            x.globalAlpha = 1;
            x.shadowBlur = 0;
        }
        
        function init() {
            bird = { x: 80, y: GH / 2, v: 0 };
            pipes = [];
            particles = [];
            score = 0;
            playing = false;
            document.getElementById('score').textContent = '0';
        }
        
        function spawn() {
            const gap = P;
            const minY = 60;
            const maxY = GH - gap - 60;
            const h = Math.random() * (maxY - minY) + minY;
            pipes.push({ x: GW, h: h, passed: false });
        }
        
        function flap() {
            if (!playing) return;
            bird.v = -7;
            // Spawn flap particles
            spawnParticles(bird.x - 5, bird.y + 8, 4, '#fbbf24', '#fef08a');
        }
        
        let lastTime = 0;
        const targetDelta = 1000 / 60;
        
        function update(timestamp) {
            if (!playing) return;
            
            // Delta time for smooth animation
            if (!lastTime) lastTime = timestamp;
            const delta = timestamp - lastTime;
            lastTime = timestamp;
            
            // Skip large frame gaps (e.g. tab switch)
            if (delta > 100) {
                loop = requestAnimationFrame(update);
                return;
            }
            
            const dt = Math.min(delta / targetDelta, 2);
            
            // Physics
            bird.v += G * dt;
            bird.y += bird.v * dt;
            
            // Trail particles
            if (Math.random() > 0.5) spawnTrailParticle();
            
            // Spawn pipes
            if (pipes.length === 0 || pipes[pipes.length - 1].x < GW - 180) {
                spawn();
            }
            
            // Update pipes
            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= S * dt;
                
                // Collision
                const p = pipes[i];
                if (bird.x + 12 > p.x && bird.x - 12 < p.x + 60) {
                    if (bird.y - 12 < p.h || bird.y + 12 > p.h + P) {
                        gameover();
                        return;
                    }
                }
                
                // Score
                if (p.x + 60 < bird.x && !p.passed) {
                    p.passed = true;
                    score++;
                    document.getElementById('score').textContent = score;
                    // Score particles
                    spawnParticles(bird.x, bird.y - 20, 6, '#06b6d4', '#22d3ee');
                }
                
                // Remove off-screen
                if (p.x + 60 < 0) {
                    pipes.splice(i, 1);
                }
            }
            
            // Boundary
            if (bird.y < 0 || bird.y > GH) {
                gameover();
                return;
            }
            
            // Update particles
            updateParticles();
            
            draw();
            loop = requestAnimationFrame(update);
        }
        
        function draw() {
            // Background gradient
            const bgGrad = x.createLinearGradient(0, 0, 0, GH);
            bgGrad.addColorStop(0, '#0a0a15');
            bgGrad.addColorStop(1, '#0f172a');
            x.fillStyle = bgGrad;
            x.fillRect(0, 0, GW, GH);
            
            // Subtle animated stars
            x.fillStyle = 'rgba(148, 163, 184, 0.15)';
            for (let i = 0; i < 30; i++) {
                const sx = ((i * 127 + 43) % GW);
                const sy = ((i * 89 + 17) % GH);
                const ss = ((i % 3) + 1) * 0.5;
                x.beginPath();
                x.arc(sx, sy, ss, 0, Math.PI * 2);
                x.fill();
            }
            
            // Grid pattern
            x.strokeStyle = 'rgba(6, 182, 212, 0.04)';
            x.lineWidth = 1;
            for (let i = 0; i < GW; i += 30) {
                x.beginPath();
                x.moveTo(i, 0);
                x.lineTo(i, GH);
                x.stroke();
            }
            for (let i = 0; i < GH; i += 30) {
                x.beginPath();
                x.moveTo(0, i);
                x.lineTo(GW, i);
                x.stroke();
            }
            
            // Pipes with glow
            pipes.forEach(p => {
                // Top pipe glow
                x.shadowColor = 'rgba(6, 182, 212, 0.4)';
                x.shadowBlur = 18;
                
                const topGrad = x.createLinearGradient(p.x, 0, p.x + 60, 0);
                topGrad.addColorStop(0, '#0891b2');
                topGrad.addColorStop(0.5, '#06b6d4');
                topGrad.addColorStop(1, '#0891b2');
                
                x.fillStyle = topGrad;
                x.fillRect(p.x, 0, 60, p.h);
                
                // Top pipe cap
                const capGrad = x.createLinearGradient(p.x - 5, 0, p.x + 70, 0);
                capGrad.addColorStop(0, '#22d3ee');
                capGrad.addColorStop(0.5, '#67e8f9');
                capGrad.addColorStop(1, '#22d3ee');
                x.fillStyle = capGrad;
                x.fillRect(p.x - 5, p.h - 25, 70, 25);
                
                // Bottom pipe
                x.fillStyle = topGrad;
                x.fillRect(p.x, p.h + P, 60, GH - p.h - P);
                
                // Bottom pipe cap
                x.fillStyle = capGrad;
                x.fillRect(p.x - 5, p.h + P, 70, 25);
                
                // Pipe inner highlights
                x.shadowBlur = 0;
                x.fillStyle = 'rgba(255, 255, 255, 0.08)';
                x.fillRect(p.x + 8, 0, 6, p.h - 25);
                x.fillRect(p.x + 8, p.h + P + 25, 6, GH - p.h - P - 25);
            });
            
            x.shadowBlur = 0;
            
            // Draw particles (behind bird)
            drawParticles();
            
            // Bird with glow
            x.save();
            x.translate(bird.x, bird.y);
            x.rotate(Math.min(bird.v * 4, 60) * Math.PI / 180);
            
            // Glow aura
            x.shadowColor = 'rgba(251, 191, 36, 0.6)';
            x.shadowBlur = 25;
            
            // Body
            const bodyGrad = x.createRadialGradient(0, 0, 0, 0, 0, 18);
            bodyGrad.addColorStop(0, '#fef08a');
            bodyGrad.addColorStop(0.7, '#fbbf24');
            bodyGrad.addColorStop(1, '#f59e0b');
            x.fillStyle = bodyGrad;
            x.beginPath();
            x.arc(0, 0, 16, 0, Math.PI * 2);
            x.fill();
            
            // Eye white
            x.shadowBlur = 0;
            x.fillStyle = '#fff';
            x.beginPath();
            x.arc(6, -4, 7, 0, Math.PI * 2);
            x.fill();
            
            // Eye pupil
            x.fillStyle = '#1f2937';
            x.beginPath();
            x.arc(8, -4, 3, 0, Math.PI * 2);
            x.fill();
            
            // Eye shine
            x.fillStyle = '#fff';
            x.beginPath();
            x.arc(9, -5.5, 1.2, 0, Math.PI * 2);
            x.fill();
            
            // Beak
            x.fillStyle = '#f97316';
            x.beginPath();
            x.moveTo(12, 0);
            x.lineTo(24, 3);
            x.lineTo(12, 6);
            x.closePath();
            x.fill();
            
            // Wing
            x.fillStyle = '#f59e0b';
            x.beginPath();
            x.ellipse(-4, 4, 8, 5, 0, 0, Math.PI * 2);
            x.fill();
            
            // Wing highlight
            x.fillStyle = 'rgba(254, 240, 138, 0.4)';
            x.beginPath();
            x.ellipse(-3, 2, 5, 3, 0, 0, Math.PI * 2);
            x.fill();
            
            x.restore();
            
            // Score glow effect on canvas
            if (playing && score > 0) {
                x.save();
                x.globalAlpha = 0.12;
                x.font = 'bold 120px "Sora", sans-serif';
                x.textAlign = 'center';
                x.textBaseline = 'middle';
                x.fillStyle = '#06b6d4';
                x.shadowColor = 'rgba(6, 182, 212, 0.3)';
                x.shadowBlur = 30;
                x.fillText(score, GW / 2, GH / 2);
                x.restore();
            }
        }
        
        function gameover() {
            playing = false;
            lastTime = 0;
            cancelAnimationFrame(loop);
            
            // Explosion particles at bird position
            spawnParticles(bird.x, bird.y, 25, '#ef4444', '#fbbf24');
            spawnParticles(bird.x, bird.y, 15, '#f97316', '#fef08a');
            
            // Draw final frame with explosion
            updateParticles();
            draw();
            
            if (score > high) {
                high = score;
                localStorage.setItem('flappy_high', high);
                document.getElementById('highScoreBox').classList.add('new-best');
                setTimeout(() => document.getElementById('highScoreBox').classList.remove('new-best'), 1500);
            }
            
            document.getElementById('final').textContent = score;
            document.getElementById('high').textContent = 'Best: ' + high;
            document.getElementById('over').classList.remove('hidden');
        }
        
        function start() {
            init();
            playing = true;
            lastTime = 0;
            document.getElementById('start').classList.add('hidden');
            document.getElementById('over').classList.add('hidden');
            draw();
            loop = requestAnimationFrame(update);
        }
        
        // Event listeners
        document.getElementById('startBtn').onclick = start;
        document.getElementById('retryBtn').onclick = start;
        
        document.onkeydown = e => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!playing && document.getElementById('start').classList.contains('hidden')) {
                    start();
                } else {
                    flap();
                }
            }
        };
        
        cv.onclick = flap;
        
        cv.addEventListener('touchstart', e => {
            e.preventDefault();
            flap();
        }, { passive: false });
        
        // Initial draw
        init();
        resizeCanvas();

        // Right-click protection
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
