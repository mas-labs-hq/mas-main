<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Space Dodger - MortApps Studios</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --surface: #0f172a;
            --surface-light: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --border: rgba(51, 65, 85, 0.5);
            --font-display: 'Sora', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            background: #050510;
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(2, 6, 23, 0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0.6rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 0.5rem 0.75rem;
            border-radius: 10px;
            transition: all 0.2s;
        }
        .back-btn:hover { color: var(--text); background: var(--surface-light); }
        .brand { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: var(--text); }
        .brand-icon {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px var(--accent-glow);
        }
        .brand-icon svg { width: 18px; height: 18px; }
        .brand-text { font-family: var(--font-display); font-weight: 700; font-size: 1rem; }
        .score-display {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent-light);
            text-shadow: 0 0 20px var(--accent-glow);
            min-width: 50px;
            text-align: right;
        }
        .game-wrapper {
            padding-top: 52px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .game-container {
            position: relative;
            background: linear-gradient(145deg, var(--surface), rgba(15, 23, 42, 0.8));
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 0.4rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 60px -20px var(--accent-glow);
            overflow: hidden;
        }
        canvas { display: block; border-radius: 16px; image-rendering: auto; }

        /* D-Pad Controls */
        .dpad-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            display: none;
        }
        .dpad {
            position: relative;
            width: 160px;
            height: 160px;
        }
        .dpad-btn {
            position: absolute;
            width: 52px;
            height: 52px;
            background: rgba(99, 102, 241, 0.2);
            border: 1.5px solid rgba(99, 102, 241, 0.4);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            transition: all 0.1s;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .dpad-btn:active, .dpad-btn.pressed {
            background: rgba(99, 102, 241, 0.5);
            border-color: var(--accent-light);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: scale(0.92);
        }
        .dpad-btn svg { width: 22px; height: 22px; pointer-events: none; }
        .dpad-up { top: 0; left: 50%; transform: translateX(-50%); }
        .dpad-up:active, .dpad-up.pressed { transform: translateX(-50%) scale(0.92); }
        .dpad-down { bottom: 0; left: 50%; transform: translateX(-50%); }
        .dpad-down:active, .dpad-down.pressed { transform: translateX(-50%) scale(0.92); }
        .dpad-left { left: 0; top: 50%; transform: translateY(-50%); }
        .dpad-left:active, .dpad-left.pressed { transform: translateY(-50%) scale(0.92); }
        .dpad-right { right: 0; top: 50%; transform: translateY(-50%); }
        .dpad-right:active, .dpad-right.pressed { transform: translateY(-50%) scale(0.92); }
        .dpad-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 32px; height: 32px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 50%;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        /* Overlays */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            z-index: 10;
            transition: opacity 0.35s ease, visibility 0.35s;
            opacity: 1;
            visibility: visible;
        }
        .overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .overlay-content { text-align: center; padding: 1.5rem; max-width: 280px; }
        .overlay-icon { 
            width: 80px; height: 80px; 
            margin: 0 auto 1rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .overlay-icon svg { width: 100%; height: 100%; }
        .overlay-icon.bounce { animation: bounce 0.6s ease infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        .overlay-title {
            font-family: var(--font-display);
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .overlay-subtitle { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1.25rem; line-height: 1.5; }
        .score-large {
            font-family: var(--font-display);
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-light), #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0.5rem 0;
        }
        .score-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }
        .high-score {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin: 1rem 0;
            padding: 0.5rem 1rem;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.25);
            border-radius: 10px;
        }
        .high-score svg { width: 20px; height: 20px; }
        .high-score-text { font-family: var(--font-display); font-weight: 700; color: #f59e0b; font-size: 0.9rem; }
        .btn {
            font-family: var(--font-body);
            font-weight: 600;
            border: none;
            cursor: pointer;
            padding: 0.8rem 1.75rem;
            border-radius: 14px;
            font-size: 0.95rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn svg { width: 18px; height: 18px; }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            color: white;
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 25px var(--accent-glow); }
        .btn-primary:active { transform: translateY(0) scale(0.97); }
        .game-footer { 
            position: fixed; bottom: 0; width: 100%; text-align: center; 
            padding: 0.75rem; color: var(--text-muted); font-size: 0.7rem; 
            background: linear-gradient(to top, var(--bg), transparent);
            pointer-events: none;
        }

        /* Responsive */
        @media (max-width: 400px) {
            .brand-text { display: none; }
            .score-display { font-size: 1.25rem; }
            .overlay-title { font-size: 1.5rem; }
            .score-large { font-size: 2.75rem; }
            .overlay-content { padding: 1rem; max-width: 240px; }
            .overlay-icon { width: 64px; height: 64px; }
            .dpad { width: 140px; height: 140px; }
            .dpad-btn { width: 46px; height: 46px; }
            .game-footer { display: none; }
        }

        /* Touch device detection */
        @media (hover: none) and (pointer: coarse) {
            .dpad-container { display: block; }
        }
    </style>
</head>
<body>

                            <circle cx="40" cy="34" r="5" fill="#1e1b4b" stroke="#c7d2fe" stroke-width="1.5"/>

            <button class="dpad-btn dpad-up" id="dpadUp" aria-label="Move Up">

                <svg viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">

    <footer class="game-footer">&copy; 2026 MortApps Studios</footer>
    
    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());

        const cv = document.getElementById('c');
        const ctx = cv.getContext('2d');
        const container = document.getElementById('gameContainer');
        const scoreEl = document.getElementById('score');
        const finalEl = document.getElementById('final');
        const highEl = document.getElementById('high');
        
        // Base design dimensions
        const BASE_W = 360, BASE_H = 540;
        let W = BASE_W, H = BASE_H, scale = 1;
        
        let ship, asteroids, stars, particles, score, high = parseInt(localStorage.getItem('space_high')) || 0, playing = false;
        const keys = { l: 0, r: 0, u: 0, d: 0 };
        
        highEl.textContent = 'Best: ' + high;

        // Adaptive canvas sizing
        function resizeCanvas() {
            const maxW = window.innerWidth - 24;
            const maxH = window.innerHeight - 80;
            const isTouchDevice = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
            const dpadReserve = isTouchDevice ? 180 : 0;
            const availH = maxH - dpadReserve;
            
            const scaleX = maxW / BASE_W;
            const scaleY = availH / BASE_H;
            scale = Math.min(scaleX, scaleY, 1.5);
            
            W = Math.floor(BASE_W * scale);
            H = Math.floor(BASE_H * scale);
            
            cv.width = W;
            cv.height = H;
            cv.style.width = W + 'px';
            cv.style.height = H + 'px';
        }
        
        resizeCanvas();
        window.addEventListener('resize', () => {
            resizeCanvas();
            if (!playing) {
                init();
                draw();
            }
        });

        // Pre-allocated objects for performance
        const MAX_PARTICLES = 80;
        const MAX_ASTEROIDS = 40;

        function init() {
            ship = { x: W / 2, y: H - 80 * scale, w: 40 * scale, h: 50 * scale, s: 6 * scale };
            asteroids = [];
            stars = [];
            particles = [];
            score = 0;
            for (let i = 0; i < 60; i++) {
                stars.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    s: (Math.random() * 1.5 + 0.5) * scale,
                    sp: (Math.random() * 1.5 + 0.5) * scale,
                    phase: Math.random() * Math.PI * 2
                });
            }
            scoreEl.textContent = '0';
        }
        
        function spawn() {
            if (asteroids.length >= MAX_ASTEROIDS) return;
            const size = (20 + Math.random() * 30) * scale;
            asteroids.push({
                x: Math.random() * W,
                y: -size,
                size: size,
                sp: (1 + Math.random() * 2 + score / 500) * scale,
                rot: 0,
                rotSp: (Math.random() - 0.5) * 0.1,
                vertices: generateAsteroidShape()
            });
        }

        function generateAsteroidShape() {
            const pts = [];
            for (let i = 0; i < 8; i++) {
                pts.push(0.7 + Math.sin(i * 3.7) * 0.25);
            }
            return pts;
        }
        
        function explode(px, py) {
            for (let i = 0; i < 20; i++) {
                if (particles.length >= MAX_PARTICLES) break;
                particles.push({
                    x: px, y: py,
                    vx: (Math.random() - 0.5) * 10 * scale,
                    vy: (Math.random() - 0.5) * 10 * scale,
                    life: 1,
                    c: Math.random() > 0.5 ? '#ff6b35' : '#fbbf24',
                    size: (2 + Math.random() * 2) * scale
                });
            }
        }
        
        let lastTime = 0;
        function update(timestamp) {
            if (!playing) return;
            
            // Delta time for frame-rate independence
            const dt = Math.min((timestamp - lastTime) / 16.67, 2); // normalize to 60fps baseline
            lastTime = timestamp;
            
            ship.x += (keys.r - keys.l) * dt;
            ship.y += (keys.d - keys.u) * dt;
            ship.x = Math.max(ship.w / 2, Math.min(W - ship.w / 2, ship.x));
            ship.y = Math.max(ship.h / 2, Math.min(H - ship.h / 2, ship.y));
            
            stars.forEach(s => {
                s.y += s.sp * dt;
                if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
            });
            
            if (Math.random() < (0.03 + score / 5000) * dt) spawn();
            
            for (let i = asteroids.length - 1; i >= 0; i--) {
                const a = asteroids[i];
                a.y += a.sp * dt;
                a.rot += a.rotSp * dt;
                const dx = ship.x - (a.x + a.size / 2);
                const dy = ship.y - (a.y + a.size / 2);
                if (dx * dx + dy * dy < (a.size / 2 + ship.w / 3) * (a.size / 2 + ship.w / 3)) {
                    explode(ship.x, ship.y);
                    gameover();
                    return;
                }
                if (a.y > H + a.size) {
                    asteroids[i] = asteroids[asteroids.length - 1];
                    asteroids.pop();
                }
            }
            
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.life -= 0.025 * dt;
                if (p.life <= 0) {
                    particles[i] = particles[particles.length - 1];
                    particles.pop();
                }
            }
            
            score += dt;
            scoreEl.textContent = Math.floor(score / 10);
            draw();
        }
        
        function draw() {
            ctx.fillStyle = '#050510';
            ctx.fillRect(0, 0, W, H);
            
            // Stars
            const now = Date.now();
            for (let i = 0; i < stars.length; i++) {
                const s = stars[i];
                ctx.globalAlpha = 0.4 + Math.sin(now / 500 + s.phase) * 0.3;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.s, 0, 6.2832);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            
            // Asteroids
            for (let i = 0; i < asteroids.length; i++) {
                const a = asteroids[i];
                ctx.save();
                ctx.translate(a.x + a.size / 2, a.y + a.size / 2);
                ctx.rotate(a.rot);
                
                // Asteroid shadow/glow
                ctx.shadowColor = 'rgba(100, 100, 130, 0.3)';
                ctx.shadowBlur = 8 * scale;
                
                ctx.fillStyle = '#4a4a5a';
                ctx.beginPath();
                const verts = a.vertices;
                for (let j = 0; j < 8; j++) {
                    const ang = j / 8 * 6.2832;
                    const r = a.size / 2 * verts[j];
                    if (!j) ctx.moveTo(Math.cos(ang) * r, Math.sin(ang) * r);
                    else ctx.lineTo(Math.cos(ang) * r, Math.sin(ang) * r);
                }
                ctx.closePath();
                ctx.fill();
                
                // Highlight
                ctx.fillStyle = 'rgba(120, 120, 150, 0.3)';
                ctx.beginPath();
                ctx.arc(-a.size * 0.1, -a.size * 0.1, a.size * 0.2, 0, 6.2832);
                ctx.fill();
                
                ctx.shadowBlur = 0;
                ctx.restore();
            }
            
            // Ship
            ctx.save();
            ctx.translate(ship.x, ship.y);
            
            // Ship glow
            ctx.shadowColor = '#6366f1';
            ctx.shadowBlur = 25 * scale;
            ctx.fillStyle = '#6366f1';
            ctx.beginPath();
            ctx.moveTo(0, -ship.h / 2);
            ctx.lineTo(-ship.w / 2, ship.h / 2);
            ctx.lineTo(0, ship.h / 3);
            ctx.lineTo(ship.w / 2, ship.h / 2);
            ctx.closePath();
            ctx.fill();
            
            // Ship inner highlight
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(129, 140, 248, 0.5)';
            ctx.beginPath();
            ctx.moveTo(0, -ship.h / 2 + 6 * scale);
            ctx.lineTo(-ship.w / 4, ship.h / 3);
            ctx.lineTo(0, ship.h / 4);
            ctx.lineTo(ship.w / 4, ship.h / 3);
            ctx.closePath();
            ctx.fill();
            
            // Flame
            ctx.shadowColor = '#fbbf24';
            ctx.shadowBlur = 15 * scale;
            ctx.fillStyle = '#fbbf24';
            const f = (10 + Math.random() * 8) * scale;
            ctx.beginPath();
            ctx.moveTo(-7 * scale, ship.h / 3);
            ctx.lineTo(0, ship.h / 2 + f);
            ctx.lineTo(7 * scale, ship.h / 3);
            ctx.closePath();
            ctx.fill();
            
            // Inner flame
            ctx.fillStyle = '#fef3c7';
            ctx.beginPath();
            ctx.moveTo(-3 * scale, ship.h / 3);
            ctx.lineTo(0, ship.h / 2 + f * 0.6);
            ctx.lineTo(3 * scale, ship.h / 3);
            ctx.closePath();
            ctx.fill();
            
            ctx.shadowBlur = 0;
            ctx.restore();
            
            // Particles
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.c;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, 6.2832);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }
        
        function gameover() {
            playing = false;
            if (score > high) {
                high = score;
                localStorage.setItem('space_high', high);
                highEl.textContent = 'Best: ' + high;
            }
            finalEl.textContent = Math.floor(score / 10);
            document.getElementById('over').classList.remove('hidden');
        }
        
        function start() {
            init();
            playing = true;
            document.getElementById('start').classList.add('hidden');
            document.getElementById('over').classList.add('hidden');
            draw();
            lastTime = performance.now();
            (function loop(ts) {
                if (!playing) return;
                update(ts);
                requestAnimationFrame(loop);
            })(performance.now());
        }
        
        // Keyboard controls
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft' || e.key === 'a') { keys.l = ship.s; e.preventDefault(); }
            if (e.key === 'ArrowRight' || e.key === 'd') { keys.r = ship.s; e.preventDefault(); }
            if (e.key === 'ArrowUp' || e.key === 'w') { keys.u = ship.s; e.preventDefault(); }
            if (e.key === 'ArrowDown' || e.key === 's') { keys.d = ship.s; e.preventDefault(); }
        });
        document.addEventListener('keyup', e => {
            if (e.key === 'ArrowLeft' || e.key === 'a') keys.l = 0;
            if (e.key === 'ArrowRight' || e.key === 'd') keys.r = 0;
            if (e.key === 'ArrowUp' || e.key === 'w') keys.u = 0;
            if (e.key === 'ArrowDown' || e.key === 's') keys.d = 0;
        });
        
        // Touch swipe controls
        let tStart = null;
        cv.addEventListener('touchstart', e => {
            e.preventDefault();
            tStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }, { passive: false });
        cv.addEventListener('touchmove', e => {
            e.preventDefault();
            if (!tStart || !playing) return;
            const dx = e.touches[0].clientX - tStart.x;
            const dy = e.touches[0].clientY - tStart.y;
            ship.x += dx * 0.6;
            ship.y += dy * 0.6;
            tStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }, { passive: false });
        cv.addEventListener('touchend', () => { tStart = null; });

        // D-Pad controls
        function setupDpadBtn(id, key, direction) {
            const btn = document.getElementById(id);
            const startPress = (e) => {
                e.preventDefault();
                if (!ship) return;
                keys[direction] = ship.s;
                btn.classList.add('pressed');
            };
            const endPress = (e) => {
                e.preventDefault();
                keys[direction] = 0;
                btn.classList.remove('pressed');
            };
            btn.addEventListener('touchstart', startPress, { passive: false });
            btn.addEventListener('touchend', endPress, { passive: false });
            btn.addEventListener('touchcancel', endPress, { passive: false });
            btn.addEventListener('mousedown', startPress);
            btn.addEventListener('mouseup', endPress);
            btn.addEventListener('mouseleave', endPress);
        }

        setupDpadBtn('dpadUp', 'u', 'u');
        setupDpadBtn('dpadDown', 'd', 'd');
        setupDpadBtn('dpadLeft', 'l', 'l');
        setupDpadBtn('dpadRight', 'r', 'r');
        
        document.getElementById('startBtn').onclick = start;
        document.getElementById('retry').onclick = start;
        init();
        draw();
    </script>
</body>
</html>
