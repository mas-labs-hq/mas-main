<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Quick Math - MortApps Studios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --surface: #0f172a;
            --surface-light: #1e293b;
            --surface-lighter: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #f59e0b;
            --accent-light: #fbbf24;
            --accent-glow: rgba(245, 158, 11, 0.35);
            --success: #22c55e;
            --success-glow: rgba(34, 197, 94, 0.4);
            --error: #ef4444;
            --error-glow: rgba(239, 68, 68, 0.4);
            --border: rgba(51, 65, 85, 0.5);
            --border-accent: rgba(245, 158, 11, 0.3);
            --font-display: 'Sora', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Premium animated background */
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(245, 158, 11, 0.1), transparent),
                radial-gradient(ellipse 60% 40% at 80% 60%, rgba(245, 158, 11, 0.05), transparent),
                radial-gradient(ellipse 50% 30% at 20% 80%, rgba(217, 119, 6, 0.06), transparent),
                var(--bg);
        }

        .bg-mesh::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.025;
            pointer-events: none;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(3, 7, 18, 0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .back-btn:hover { color: var(--text); background: var(--surface-light); }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            color: var(--text);
        }

        .brand-icon {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }
        .brand-icon svg { width: 18px; height: 18px; }

        .brand-text {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: -0.02em;
        }

        .stats { display: flex; gap: 0.6rem; }

        .stat {
            text-align: center;
            background: var(--surface);
            padding: 0.35rem 0.75rem;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        .stat-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }
        .stat-value {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--accent-light);
        }

        /* Game wrapper */
        .game-wrapper {
            padding-top: 70px;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 1rem;
        }

        /* Adaptive game container */
        .game-container {
            background: linear-gradient(145deg, var(--surface), rgba(15, 23, 42, 0.8));
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: clamp(1.25rem, 4vw, 2rem);
            box-shadow:
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            width: min(380px, calc(100vw - 2rem));
            will-change: transform;
        }

        /* Timer bar */
        .timer-bar {
            height: 6px;
            background: var(--surface-lighter);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 1.5rem;
            position: relative;
        }
        .timer-fill {
            height: 100%;
            border-radius: 3px;
            background: linear-gradient(90deg, var(--success), var(--accent), var(--error));
            background-size: 200% 100%;
            transition: none;
            will-change: width;
        }
        .timer-fill.low { background-position: 100% 0; }
        .timer-fill.mid { background-position: 50% 0; }
        .timer-fill.high { background-position: 0% 0; }

        .timer-bar::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
            border-radius: 3px;
            pointer-events: none;
        }

        /* Equation display */
        .equation {
            font-family: var(--font-display);
            font-size: clamp(2rem, 8vw, 2.75rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-light), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
            text-align: center;
            letter-spacing: -0.02em;
            line-height: 1.2;
            transition: transform 0.15s ease;
        }
        .equation.pop {
            animation: equationPop 0.3s ease;
        }
        @keyframes equationPop {
            0% { transform: scale(0.9); opacity: 0.7; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Answer buttons */
        .answers {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: clamp(0.5rem, 2vw, 0.75rem);
        }

        .ans-btn {
            padding: clamp(0.85rem, 3vw, 1.1rem) 0.5rem;
            min-height: 52px;
            background: var(--surface-light);
            border: 2px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-family: var(--font-display);
            font-size: clamp(1.1rem, 4vw, 1.35rem);
            font-weight: 700;
            cursor: pointer;
            transition: border-color 0.15s, background 0.2s, transform 0.15s, box-shadow 0.2s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            overflow: hidden;
        }

        .ans-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255,255,255,0.15), transparent 70%);
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .ans-btn:active:not(:disabled)::after { opacity: 1; }

        .ans-btn:hover:not(:disabled) {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.15);
        }
        .ans-btn:active:not(:disabled) {
            transform: translateY(0) scale(0.97);
        }

        .ans-btn.correct {
            background: var(--success);
            border-color: var(--success);
            color: white;
            animation: correctPulse 0.4s ease;
            box-shadow: 0 0 20px var(--success-glow);
        }
        @keyframes correctPulse {
            0% { transform: scale(1); }
            30% { transform: scale(1.08); }
            60% { transform: scale(0.96); }
            100% { transform: scale(1); }
        }

        .ans-btn.wrong {
            background: var(--error);
            border-color: var(--error);
            color: white;
            animation: wrongShake 0.4s ease;
            box-shadow: 0 0 20px var(--error-glow);
        }
        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* Streak display */
        .streak-container {
            margin-top: 1rem;
            text-align: center;
            min-height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }
        .streak-text {
            font-family: var(--font-display);
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--accent-light);
            opacity: 0;
            transform: translateY(8px) scale(0.9);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .streak-text.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .streak-text.hot {
            color: #ff6b35;
            text-shadow: 0 0 12px rgba(255, 107, 53, 0.5);
            font-size: 1.05rem;
        }
        .streak-text.fire {
            color: #ff3d00;
            text-shadow: 0 0 16px rgba(255, 61, 0, 0.6);
            font-size: 1.15rem;
            animation: fireGlow 0.6s ease infinite alternate;
        }
        @keyframes fireGlow {
            from { text-shadow: 0 0 12px rgba(255, 61, 0, 0.4); }
            to { text-shadow: 0 0 24px rgba(255, 61, 0, 0.7); }
        }
        .streak-icon {
            display: inline-flex;
            transition: all 0.3s ease;
        }
        .streak-icon.pop {
            animation: iconPop 0.3s ease;
        }
        @keyframes iconPop {
            0% { transform: scale(0.5) rotate(-15deg); }
            60% { transform: scale(1.3) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        /* Score popup */
        .score-popup {
            position: absolute;
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--success);
            pointer-events: none;
            animation: scoreFloat 0.8s ease forwards;
            z-index: 10;
        }
        @keyframes scoreFloat {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-40px) scale(1.3); }
        }

        /* Overlays */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(3, 7, 18, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 1;
            transition: opacity 0.35s ease;
        }
        .overlay.hidden { opacity: 0; pointer-events: none; }

        .overlay-content {
            text-align: center;
            padding: 2rem;
            max-width: 340px;
            width: calc(100vw - 2rem);
        }

        .overlay-icon {
            width: 80px; height: 80px;
            margin: 0 auto 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .overlay-icon.bounce { animation: iconBounce 0.8s ease infinite; }
        @keyframes iconBounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-12px) scale(1.05); }
        }

        .overlay-title {
            font-family: var(--font-display);
            font-size: clamp(1.75rem, 6vw, 2.25rem);
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .overlay-subtitle {
            color: var(--text-muted);
            margin-bottom: 1.75rem;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1.25rem 0 1.75rem;
        }

        .final-stat { text-align: center; }
        .final-stat-value {
            font-family: var(--font-display);
            font-size: clamp(2rem, 7vw, 2.5rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-light), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .final-stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Buttons */
        .btn {
            font-family: var(--font-body);
            font-weight: 600;
            border: none;
            cursor: pointer;
            padding: 0.875rem 2rem;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-height: 48px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #d97706);
            color: #000;
            box-shadow: 0 4px 15px var(--accent-glow);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--accent-glow); }
        .btn-primary:active { transform: translateY(0) scale(0.97); }

        .btn svg { width: 18px; height: 18px; flex-shrink: 0; }

        .game-footer {
            text-align: center;
            padding: 1rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            letter-spacing: 0.02em;
        }

        /* Particles container for streak effects */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 50;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            animation: particleFly 0.7s ease forwards;
        }
        @keyframes particleFly {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
        }

        /* Responsive */
        @media (max-width: 420px) {
            .header { padding: 0.6rem 0.75rem; }
            .brand-text { display: none; }
            .game-container { padding: clamp(1rem, 3.5vw, 1.5rem); border-radius: 20px; }
            .stat { padding: 0.3rem 0.6rem; }
            .stat-value { font-size: 0.95rem; }
        }

        @media (max-height: 600px) {
            .game-wrapper { padding-top: 60px; }
            .equation { margin-bottom: 1rem; font-size: clamp(1.6rem, 6vw, 2.2rem); }
            .timer-bar { margin-bottom: 1rem; }
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="particles" id="particles"></div>

    <header class="header">
        <a href="../games.html" class="back-btn">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            Back
        </a>
        <a href="../index.html" class="brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </div>
            <span class="brand-text">MortApps</span>
        </a>
        <div class="stats">
            <div class="stat"><div class="stat-label">Score</div><div class="stat-value" id="score">0</div></div>
            <div class="stat"><div class="stat-label">Best</div><div class="stat-value" id="best">0</div></div>
        </div>
    </header>

    <div class="game-wrapper">
        <div class="game-container" id="gameContainer">
            <div class="timer-bar"><div class="timer-fill high" id="timer" style="width: 100%"></div></div>
            <div class="equation" id="eq">? + ? = ?</div>
            <div class="answers" id="answers"></div>
            <div class="streak-container" id="streakContainer">
                <span class="streak-icon" id="streakIcon"></span>
                <span class="streak-text" id="streak"></span>
            </div>
        </div>
    </div>

    <!-- Start Overlay -->
    <div class="overlay" id="startOverlay">
        <div class="overlay-content">
            <div class="overlay-icon bounce">
                <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
                    <circle cx="36" cy="36" r="30" stroke="#f59e0b" stroke-width="3" opacity="0.3"/>
                    <circle cx="36" cy="36" r="22" fill="rgba(245, 158, 11, 0.15)"/>
                    <line x1="36" y1="20" x2="36" y2="52" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
                    <line x1="20" y1="36" x2="52" y2="36" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
                </svg>
            </div>
            <h1 class="overlay-title">Quick Math</h1>
            <p class="overlay-subtitle">Solve math problems before time runs out! Build streaks for bonus points!</p>
            <button class="btn btn-primary" id="startBtn">
                <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
                Start Game
            </button>
        </div>
    </div>

    <!-- Game Over Overlay -->
    <div class="overlay hidden" id="over">
        <div class="overlay-content">
            <div class="overlay-icon">
                <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
                    <circle cx="36" cy="36" r="28" stroke="#f59e0b" stroke-width="3" opacity="0.3"/>
                    <circle cx="36" cy="36" r="22" fill="rgba(245, 158, 11, 0.1)" stroke="#f59e0b" stroke-width="2"/>
                    <line x1="36" y1="22" x2="36" y2="38" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
                    <circle cx="36" cy="46" r="2.5" fill="#fbbf24"/>
                </svg>
            </div>
            <h1 class="overlay-title">Time's Up!</h1>
            <div class="stats-row">
                <div class="final-stat"><div class="final-stat-value" id="fScore">0</div><div class="final-stat-label">Score</div></div>
                <div class="final-stat"><div class="final-stat-value" id="fCorrect">0</div><div class="final-stat-label">Correct</div></div>
            </div>
            <button class="btn btn-primary" id="again">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                Play Again
            </button>
        </div>
    </div>

    <footer class="game-footer">&copy; 2026 MortApps Studios</footer>

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());

        /* ─── State ─── */
        let score = 0;
        let best = parseInt(localStorage.getItem('math_best')) || 0;
        let correct = 0;
        let time = 100;
        let streak = 0;
        let answer = 0;
        let playing = false;
        let rafId = null;
        let lastTimestamp = 0;
        const TICK_MS = 100; // timer resolution
        let accumulator = 0;

        document.getElementById('best').textContent = best;

        /* ─── SVG Icon generators ─── */
        function flameSVG(size = 18) {
            return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none">
                <path d="M12 2c-1.5 4-5 6-5 10a5 5 0 0 0 10 0c0-4-3.5-6-5-10z" fill="#ff6b35" stroke="#ff3d00" stroke-width="1"/>
                <path d="M12 10c-.7 2-2.5 3-2.5 5a2.5 2.5 0 0 0 5 0c0-2-1.8-3-2.5-5z" fill="#fbbf24"/>
            </svg>`;
        }

        /* ─── Particles ─── */
        function spawnParticles(x, y, color, count = 8) {
            const container = document.getElementById('particles');
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
                const dist = 30 + Math.random() * 40;
                p.style.cssText = `
                    left: ${x}px; top: ${y}px;
                    background: ${color};
                    --tx: ${Math.cos(angle) * dist}px;
                    --ty: ${Math.sin(angle) * dist}px;
                    width: ${4 + Math.random() * 4}px;
                    height: ${4 + Math.random() * 4}px;
                `;
                container.appendChild(p);
                p.addEventListener('animationend', () => p.remove());
            }
        }

        /* ─── Generate Question ─── */
        function gen() {
            const ops = ['+', '-', '\u00d7'];
            const op = ops[Math.floor(Math.random() * ops.length)];
            let a, b, ans;
            if (op === '\u00d7') { a = Math.floor(Math.random() * 12) + 1; b = Math.floor(Math.random() * 12) + 1; ans = a * b; }
            else if (op === '-') { a = Math.floor(Math.random() * 20) + 10; b = Math.floor(Math.random() * a); ans = a - b; }
            else { a = Math.floor(Math.random() * 20) + 1; b = Math.floor(Math.random() * 20) + 1; ans = a + b; }

            const eq = document.getElementById('eq');
            eq.textContent = `${a} ${op} ${b} = ?`;
            eq.classList.remove('pop');
            void eq.offsetWidth; // reflow
            eq.classList.add('pop');

            answer = ans;

            const wrongs = new Set([ans]);
            while (wrongs.size < 4) {
                const offset = Math.floor(Math.random() * 20) - 10;
                const candidate = ans + offset;
                if (candidate >= 0) wrongs.add(candidate);
            }
            const shuffled = [...wrongs].sort(() => Math.random() - 0.5);

            const answers = document.getElementById('answers');
            answers.innerHTML = '';
            shuffled.forEach(v => {
                const btn = document.createElement('button');
                btn.className = 'ans-btn';
                btn.textContent = v;
                btn.addEventListener('click', () => check(v, btn), { passive: true });
                answers.appendChild(btn);
            });
        }

        /* ─── Check Answer ─── */
        function check(v, btn) {
            if (!playing) return;
            const allBtns = document.querySelectorAll('.ans-btn');
            allBtns.forEach(x => { x.disabled = true; x.style.pointerEvents = 'none'; });

            const rect = btn.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;

            if (v === answer) {
                btn.classList.add('correct');
                const bonus = 10 + streak * 2;
                score += bonus;
                correct++;
                streak++;
                time = Math.min(100, time + 15);

                // Score popup
                const popup = document.createElement('div');
                popup.className = 'score-popup';
                popup.textContent = `+${bonus}`;
                popup.style.left = `${cx}px`;
                popup.style.top = `${cy - 20}px`;
                document.body.appendChild(popup);
                popup.addEventListener('animationend', () => popup.remove());

                // Particles
                spawnParticles(cx, cy, '#22c55e', streak >= 5 ? 12 : 6);
            } else {
                btn.classList.add('wrong');
                streak = 0;
                time -= 20;
                allBtns.forEach(x => { if (parseInt(x.textContent) === answer) x.classList.add('correct'); });
                spawnParticles(cx, cy, '#ef4444', 4);
            }

            document.getElementById('score').textContent = score;
            updateStreak();
            setTimeout(() => { if (playing) gen(); }, 450);
        }

        /* ─── Streak Display ─── */
        function updateStreak() {
            const streakEl = document.getElementById('streak');
            const iconEl = document.getElementById('streakIcon');

            if (streak > 1) {
                streakEl.textContent = `${streak} streak!`;
                streakEl.classList.add('visible');
                streakEl.classList.remove('hot', 'fire');
                if (streak >= 7) streakEl.classList.add('fire');
                else if (streak >= 4) streakEl.classList.add('hot');

                iconEl.innerHTML = flameSVG(20);
                iconEl.classList.remove('pop');
                void iconEl.offsetWidth;
                iconEl.classList.add('pop');
            } else {
                streakEl.classList.remove('visible');
                iconEl.innerHTML = '';
            }
        }

        /* ─── Timer (RAF-based) ─── */
        function timerLoop(timestamp) {
            if (!playing) return;
            if (!lastTimestamp) lastTimestamp = timestamp;
            const delta = timestamp - lastTimestamp;
            lastTimestamp = timestamp;

            accumulator += delta;
            while (accumulator >= TICK_MS) {
                time -= 2;
                accumulator -= TICK_MS;
            }

            const timerFill = document.getElementById('timer');
            const pct = Math.max(0, time);
            timerFill.style.width = `${pct}%`;

            // Color phase
            timerFill.classList.remove('high', 'mid', 'low');
            if (pct > 60) timerFill.classList.add('high');
            else if (pct > 30) timerFill.classList.add('mid');
            else timerFill.classList.add('low');

            if (time <= 0) {
                gameover();
                return;
            }

            rafId = requestAnimationFrame(timerLoop);
        }

        /* ─── Start Game ─── */
        function start() {
            score = 0; correct = 0; streak = 0; time = 100; playing = true;
            accumulator = 0; lastTimestamp = 0;
            document.getElementById('score').textContent = 0;
            document.getElementById('streak').textContent = '';
            document.getElementById('streak').classList.remove('visible', 'hot', 'fire');
            document.getElementById('streakIcon').innerHTML = '';
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('over').classList.add('hidden');
            document.getElementById('timer').style.width = '100%';
            document.getElementById('timer').classList.add('high');
            gen();
            if (rafId) cancelAnimationFrame(rafId);
            rafId = requestAnimationFrame(timerLoop);
        }

        /* ─── Game Over ─── */
        function gameover() {
            playing = false;
            if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
            lastTimestamp = 0;
            if (score > best) {
                best = score;
                localStorage.setItem('math_best', best);
                document.getElementById('best').textContent = best;
            }
            document.getElementById('fScore').textContent = score;
            document.getElementById('fCorrect').textContent = correct;
            document.getElementById('over').classList.remove('hidden');
        }

        /* ─── Event Listeners ─── */
        document.getElementById('startBtn').onclick = start;
        document.getElementById('again').onclick = start;
    </script>
</body>
</html>
