# ============================================================
# Nginx config snippet — AI Bot Blocker (app.html only)
# ============================================================
# Add this to your nginx server block (typically in
# /etc/nginx/sites-available/your-site.conf or nginx.conf)
#
# STRATEGY:
#   - Landing page (index.html) is OPEN to all visitors including AI
#   - app.html and JS files are BLOCKED to AI user agents
#   - AI bots that hit app.html get redirected to ai-warning.html
#
# Then run: sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# Map AI user agents to a flag
map $http_user_agent $is_ai_bot {
    default 0;
    ~*gptbot 1;
    ~*chatgpt 1;
    ~*oai-searchbot 1;
    ~*claudebot 1;
    ~*claude-web 1;
    ~*anthropic 1;
    ~*google-extended 1;
    ~*google-other 1;
    ~*perplexity 1;
    ~*ccbot 1;
    ~*commoncrawl 1;
    ~*bytespider 1;
    ~*meta-externalagent 1;
    ~*meta-externalfetcher 1;
    ~*facebookbot 1;
    ~*applebot-extended 1;
    ~*amazonbot 1;
    ~*cohere-ai 1;
    ~*diffbot 1;
    ~*imagesiftbot 1;
    ~*omgili 1;
    ~*twitterbot 1;
    ~*slackbot 1;
    ~*discordbot 1;
    ~*telegrambot 1;
    ~*linkedinbot 1;
    ~*whatsapp 1;
    ~*yandexbot 1;
    ~*baiduspider 1;
    ~*sogou 1;
    ~*seznambot 1;
    ~*bot 1;
    ~*crawler 1;
    ~*spider 1;
    ~*scraper 1;
    ~*ai 1;
    ~*llm 1;
    ~*model 1;
    ~*gpt 1;
    ~*claude 1;
    ~*gemini 1;
    ~*llama 1;
    ~*mistral 1;
}

server {
    # ... your existing server config ...

    # Landing page — OPEN to everyone (including AI for marketing)
    location = / {
        add_header X-Content-Type-Options "nosniff";
        try_files /index.html =404;
    }
    location = /index.html {
        add_header X-Content-Type-Options "nosniff";
        try_files $uri =404;
    }

    # Static assets — OPEN to everyone
    location ~ \.(css|png|jpg|jpeg|gif|svg|ico|webmanifest)$ {
        add_header X-Content-Type-Options "nosniff";
        try_files $uri =404;
    }
    location /phein-icons/ {
        add_header X-Content-Type-Options "nosniff";
        try_files $uri =404;
    }
    location = /robots.txt {
        try_files $uri =404;
    }
    location = /manifest.json {
        try_files $uri =404;
    }

    # app.html and all JS files — BLOCK AI bots
    location ~ \.(html|js)$ {
        # Redirect AI bots to the warning page
        if ($is_ai_bot) {
            rewrite ^ /ai-warning.html redirect;
        }

        # No-cache for HTML and JS
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";

        # Security headers
        add_header X-Content-Type-Options "nosniff";
        add_header X-Frame-Options "SAMEORIGIN";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";

        try_files $uri /index.html;
    }

    # AI warning page — always accessible
    location = /ai-warning.html {
        add_header X-Content-Type-Options "nosniff";
        try_files $uri =404;
    }

    # Block dotfiles and sensitive files
    location ~ /\. {
        deny all;
    }
    location ~* \.(md|txt|log)$ {
        deny all;
    }
}
